name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      VPS_ENV_BLOB: ${{ secrets.VPS_ENV_BLOB }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          envs: VPS_ENV_BLOB
          script: |
            cd /opt/ai-os || exit 1
            git fetch origin main
            git reset --hard origin/main
            rsync -a --delete --exclude='node_modules' --exclude='.git' --exclude='.env' --exclude='*.db' --exclude='*.db-shm' --exclude='*.db-wal' --exclude='logs' /opt/ai-os/ /var/www/bridgeai/ 2>/dev/null || true
            npm install --production --no-audit 2>&1 | tail -3

            if [ -n "$VPS_ENV_BLOB" ]; then
              echo "=== Injecting secrets from blob ==="
              sed -i '/^SUPABASE_URL=/d;/^SUPABASE_SERVICE_KEY=/d;/^SUPABASE_ANON_KEY=/d;/^JWT_SECRET=/d' .env 2>/dev/null || true
              echo "$VPS_ENV_BLOB" | base64 -d >> .env
              echo "" >> .env
              echo "URL len: $(grep '^SUPABASE_URL=' .env | cut -d= -f2 | wc -c)"
              echo "KEY len: $(grep '^SUPABASE_SERVICE_KEY=' .env | cut -d= -f2 | wc -c)"
              cp .env /var/www/bridgeai/.env 2>/dev/null || true
            fi

            for svc in bridge-gateway super-brain unified-server god-mode-system auth-service; do
              pm2 reload $svc --update-env 2>/dev/null || pm2 restart $svc --update-env 2>/dev/null || echo "WARN: $svc not found"
            done
            pm2 save
            pm2 status
