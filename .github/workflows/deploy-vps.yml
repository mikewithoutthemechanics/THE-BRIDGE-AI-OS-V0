name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Deploy code and secrets
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            cd /opt/ai-os || exit 1
            git fetch origin main
            git reset --hard origin/main
            rsync -a --delete --exclude='node_modules' --exclude='.git' --exclude='.env' --exclude='*.db' --exclude='*.db-shm' --exclude='*.db-wal' --exclude='logs' /opt/ai-os/ /var/www/bridgeai/ 2>/dev/null || true
            npm install --production --no-audit 2>&1 | tail -5
            sed -i '/^SUPABASE_URL=/d;/^SUPABASE_SERVICE_KEY=/d;/^SUPABASE_ANON_KEY=/d;/^JWT_SECRET=/d' .env 2>/dev/null || true
            printf 'SUPABASE_URL=%s\nSUPABASE_SERVICE_KEY=%s\nSUPABASE_ANON_KEY=%s\nJWT_SECRET=%s\n' '${{ secrets.SUPABASE_URL }}' '${{ secrets.SUPABASE_SERVICE_KEY }}' '${{ secrets.SUPABASE_ANON_KEY }}' '${{ secrets.JWT_SECRET }}' >> .env
            echo "URL len: $(grep '^SUPABASE_URL=' .env | cut -d= -f2 | wc -c)"
            echo "KEY len: $(grep '^SUPABASE_SERVICE_KEY=' .env | cut -d= -f2 | wc -c)"
            cp .env /var/www/bridgeai/.env 2>/dev/null || true
            pm2 restart all --update-env
            pm2 save
            pm2 status
