name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}

    steps:
      - name: Write secrets file
        run: |
          mkdir -p /tmp/deploy
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > /tmp/deploy/secrets.env
          echo "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}" >> /tmp/deploy/secrets.env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> /tmp/deploy/secrets.env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> /tmp/deploy/secrets.env
          echo "Lines: $(wc -l < /tmp/deploy/secrets.env)"

      - name: Upload secrets to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "/tmp/deploy/secrets.env"
          target: "/tmp/"
          strip_components: 2

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /opt/ai-os || exit 1
            echo "=== Pulling latest code ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Syncing to /var/www/bridgeai ==="
            rsync -a --delete --exclude='node_modules' --exclude='.git' --exclude='.env' --exclude='*.db' --exclude='*.db-shm' --exclude='*.db-wal' --exclude='logs' /opt/ai-os/ /var/www/bridgeai/ 2>/dev/null || cp -r /opt/ai-os/public/* /var/www/bridgeai/public/ 2>/dev/null || true

            echo "=== Installing dependencies ==="
            npm install --production --no-audit 2>&1 | tail -5

            echo "=== Merging secrets into .env ==="
            if [ -f /tmp/secrets.env ]; then
              while IFS='=' read -r key val; do
                [ -z "$key" ] && continue
                sed -i "/^${key}=/d" .env 2>/dev/null
                echo "${key}=${val}" >> .env
              done < /tmp/secrets.env
              rm -f /tmp/secrets.env
              echo "Secrets merged"
            else
              echo "WARNING: /tmp/secrets.env not found"
            fi
            echo "URL length: $(grep SUPABASE_URL .env | tail -1 | wc -c)"
            echo "KEY length: $(grep SUPABASE_SERVICE_KEY .env | tail -1 | wc -c)"
            cp .env /var/www/bridgeai/.env 2>/dev/null || true

            echo "=== Restarting ALL services ==="
            pm2 restart all --update-env
            pm2 save
            echo "=== Deploy complete ==="
            pm2 status
