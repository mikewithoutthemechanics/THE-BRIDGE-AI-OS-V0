name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: SUPABASE_URL,SUPABASE_SERVICE_KEY,SUPABASE_ANON_KEY,JWT_SECRET
          script: |
            cd /opt/ai-os || exit 1
            echo "=== Pulling latest code ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Syncing to /var/www/bridgeai ==="
            rsync -a --delete --exclude='node_modules' --exclude='.git' --exclude='.env' --exclude='*.db' --exclude='*.db-shm' --exclude='*.db-wal' --exclude='logs' /opt/ai-os/ /var/www/bridgeai/ 2>/dev/null || cp -r /opt/ai-os/public/* /var/www/bridgeai/public/ 2>/dev/null || true

            echo "=== Installing dependencies ==="
            npm install --production --no-audit 2>&1 | tail -5

            echo "=== Updating .env with current secrets ==="
            touch .env
            sed -i '/^SUPABASE_URL=/d' .env
            sed -i '/^SUPABASE_SERVICE_KEY=/d' .env
            sed -i '/^SUPABASE_ANON_KEY=/d' .env
            sed -i '/^JWT_SECRET=/d' .env
            echo "SUPABASE_URL=${SUPABASE_URL}" >> .env
            echo "SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}" >> .env
            echo "SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}" >> .env
            echo "JWT_SECRET=${JWT_SECRET}" >> .env
            echo "=== Verifying .env ==="
            echo "URL length: $(grep SUPABASE_URL .env | tail -1 | wc -c)"
            echo "KEY length: $(grep SUPABASE_SERVICE_KEY .env | tail -1 | wc -c)"
            cp .env /var/www/bridgeai/.env 2>/dev/null || true

            echo "=== Restarting ALL services ==="
            pm2 restart all --update-env
            pm2 save
            echo "=== Deploy complete ==="
            pm2 status
