name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /opt/ai-os || exit 1
            echo "=== Pulling latest code ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Installing dependencies ==="
            npm install --production --no-audit 2>&1 | tail -5

            echo "=== Ensuring .env has required vars ==="
            # Only add if missing (don't duplicate)
            grep -q SUPABASE_URL .env 2>/dev/null || echo 'SUPABASE_URL=${{ secrets.SUPABASE_URL }}' >> .env
            grep -q SUPABASE_SERVICE_KEY .env 2>/dev/null || echo 'SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}' >> .env
            grep -q SUPABASE_ANON_KEY .env 2>/dev/null || echo 'SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}' >> .env
            grep -q JWT_SECRET .env 2>/dev/null || echo 'JWT_SECRET=${{ secrets.JWT_SECRET }}' >> .env

            echo "=== Restarting ALL services ==="
            pm2 restart all --update-env
            pm2 save
            echo "=== Deploy complete ==="
            pm2 status
