<svg width="100%" height="100%" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" style="background:black;font-family:monospace">

<!-- TITLE -->
<text x="50" y="60" fill="cyan" font-size="28">
BRIDGE AUTONOMOUS NETWORK BAN  LIVE CONSOLE
</text>

<!-- STATUS BOX -->
<rect x="50" y="100" width="400" height="120" stroke="cyan" fill="none"/>
<text x="60" y="130" fill="white">STATUS:</text>
<text id="status" x="60" y="160" fill="lime">SUCCESS</text>

<!-- LAST RUN -->
<rect x="50" y="240" width="400" height="120" stroke="cyan" fill="none"/>
<text x="60" y="270" fill="white">LAST RUN:</text>
<text id="last" x="60" y="300" fill="white">...</text>

<!-- MERKLE -->
<rect x="50" y="380" width="400" height="120" stroke="cyan" fill="none"/>
<text x="60" y="410" fill="white">MERKLE:</text>
<text id="merkle" x="60" y="440" fill="cyan">...</text>

<!-- HISTORY -->
<rect x="500" y="100" width="600" height="300" stroke="cyan" fill="none"/>
<text x="510" y="130" fill="white">HISTORY:</text>
<text id="history" x="510" y="160" fill="white" font-size="12"></text>

<!-- SVG PREVIEW -->
<rect x="500" y="420" width="300" height="250" stroke="cyan" fill="none"/>
<text x="510" y="450" fill="white">LATEST SVG:</text>

<g id="svgPreview" transform="translate(520,470)">
    <circle cx="100" cy="80" r="50" fill="cyan">
        <animate attributeName="r" values="40;60;40" dur="2s" repeatCount="indefinite"/>
    </circle>
</g>

<!-- NETWORK FLOW ANIMATION -->
<g>
<circle cx="900" cy="550" r="10" fill="red">
  <animateMotion dur="4s" repeatCount="indefinite"
    path="M900,550 C950,500 1000,600 1100,550"/>
</circle>
<circle cx="900" cy="550" r="10" fill="cyan">
  <animateMotion dur="3s" repeatCount="indefinite"
    path="M900,550 C950,650 1000,500 1100,550"/>
</circle>
</g>

<!-- LIVE UPDATE SCRIPT -->
<script><![CDATA[
async function update(){
 try{
  let s = await fetch("http://127.0.0.1:8000/api/status")
  let j = await s.json()

  document.getElementById("status").textContent = j.status.toUpperCase()
  document.getElementById("last").textContent = j.last_run
  document.getElementById("merkle").textContent = btoa(j.last_run||"none").substring(0,16)

  let h = await fetch("http://127.0.0.1:8000/api/history")
  let hist = await h.json()

  document.getElementById("history").textContent =
    hist.map(x=>x.timestamp + " | " + x.status).join("\n")

 }catch(e){
  document.getElementById("status").textContent = "OFFLINE"
 }
}

setInterval(update,1500)
update()
]]></script>

</svg>
