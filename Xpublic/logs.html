<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BAN · Log Viewer</title>
  <style>
    :root{--bg:#060a10;--bg2:#0a0e17;--border:#1a2540;--cyan:#63ffda;--dim:#64748b;--text:#cbd5e1;--green:#22c55e;--red:#ef4444;--gold:#f59e0b}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;min-height:100vh}
    #head{display:flex;align-items:center;gap:16px;padding:12px 20px;background:var(--bg2);border-bottom:1px solid var(--border)}
    #head h1{font-size:14px;color:var(--cyan);letter-spacing:2px}
    #head a{color:var(--cyan);text-decoration:none;font-size:11px}
    #head a:hover{text-decoration:underline}
    #layout{display:flex;height:calc(100vh - 50px)}
    #sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:8px 0}
    .log-item{padding:6px 12px;cursor:pointer;color:var(--dim);font-size:10px;border-left:2px solid transparent;transition:color .15s,border-color .15s}
    .log-item:hover,.log-item.active{color:var(--cyan);border-left-color:var(--cyan)}
    .log-item svg{color:var(--green)}
    .log-item.warn{color:var(--gold)}
    #main{flex:1;overflow:auto;padding:16px 24px}
    #toolbar{margin-bottom:12px;display:flex;gap:8px;align-items:center}
    #toolbar select{background:var(--bg2);border:1px solid var(--border);color:var(--cyan);padding:4px 10px;border-radius:4px;font-family:inherit}
    #toolbar button{background:var(--bg2);border:1px solid var(--border);color:var(--cyan);padding:4px 12px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:10px}
    #toolbar button:hover{background:#0d1424}
    #content{white-space:pre-wrap;word-break:break-all;font-size:11px;line-height:1.6;color:#94a3b8}
    #content .line{margin:1px 0}
    #content .ts{color:var(--dim)}
    #content .ok{color:var(--green)}
    #content .warn{color:var(--gold)}
    #content .err{color:var(--red)}
    #content .hdr{color:var(--cyan);font-weight:700}
    #empty{color:var(--dim);padding:24px;font-size:11px}
  </style>
</head>
<body>
  <div id="head">
    <h1>BAN · Log Viewer</h1>
    <a href="/dashboard.html">← Dashboard</a>
    <a href="/logs" target="_blank">API</a>
  </div>
  <div id="layout">
    <div id="sidebar"></div>
    <div id="main">
      <div id="toolbar">
        <select id="sel"></select>
        <button onclick="refresh()">↻ Refresh</button>
        <button onclick="toMarkdown()">📋 Copy as MD</button>
      </div>
      <div id="content"></div>
      <div id="empty">Select a log file</div>
    </div>
  </div>
  <script>
    const API = window.location.origin;
    let files = [];

    async function refresh() {
      try {
        const r = await fetch(API + '/logs');
        const d = await r.json();
        files = (d.files || []).sort((a,b) => (b.mtime||0) - (a.mtime||0));
        renderSidebar();
        renderSelect();
        if (files.length && !document.querySelector('.log-item.active')) {
          loadLog(files[0].name);
        }
      } catch (e) {
        const offlineEl = document.getElementById('sidebar');
        offlineEl.textContent = '';
        const offlineDiv = document.createElement('div');
        offlineDiv.className = 'log-item';
        offlineDiv.style.color = 'var(--red)';
        offlineDiv.textContent = 'API offline: ' + e.message;
        offlineEl.appendChild(offlineDiv);
        document.getElementById('content').textContent = 'Ensure backend is running on port 8000.';
        document.getElementById('empty').style.display = 'block';
      }
    }

    function renderSidebar() {
      const el = document.getElementById('sidebar');
      el.textContent = '';
      if (files.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'log-item';
        empty.style.color = 'var(--dim)';
        empty.textContent = 'No logs';
        el.appendChild(empty);
        return;
      }
      files.forEach(f => {
        const isSvg = f.name.includes('svg-build');
        const div = document.createElement('div');
        div.className = isSvg ? 'log-item' : 'log-item warn';
        div.dataset.name = f.name;
        div.textContent = (isSvg ? '◆ ' : '○ ') + f.name;
        div.addEventListener('click', () => loadLog(f.name));
        el.appendChild(div);
      });
    }

    function renderSelect() {
      const sel = document.getElementById('sel');
      sel.textContent = '';
      const placeholder = document.createElement('option');
      placeholder.value = '';
      placeholder.textContent = '-- select log --';
      sel.appendChild(placeholder);
      files.forEach(f => {
        const opt = document.createElement('option');
        opt.value = f.name;
        opt.textContent = f.name;
        sel.appendChild(opt);
      });
      sel.onchange = () => { if (sel.value) loadLog(sel.value); };
    }

    async function loadLog(name) {
      document.querySelectorAll('.log-item').forEach(n => n.classList.remove('active'));
      document.querySelector(`[data-name="${name}"]`)?.classList.add('active');
      document.getElementById('sel').value = name;
      document.getElementById('empty').style.display = 'none';
      try {
        const r = await fetch(API + '/logs/' + encodeURIComponent(name));
        const d = await r.json();
        const lines = (d.content || '').split('\n');
        const html = lines.map(line => {
          let cls = 'line';
          if (/^\[[\d\-: ]+\]/.test(line)) cls += ' ts';
          if (/\bOK\b|success|complete/i.test(line)) cls += ' ok';
          if (/\bWARN\b|warning/i.test(line)) cls += ' warn';
          if (/\bFAIL\b|error|err/i.test(line)) cls += ' err';
          if (/^(BUILD|SVG|===|---)/i.test(line)) cls += ' hdr';
          return `<div class="${cls}">${escapeHtml(line)}</div>`;
        }).join('');
        document.getElementById('content').innerHTML = html || '<span style="color:var(--dim)">Empty</span>';
      } catch (e) {
        const errDiv = document.createElement('div');
        errDiv.className = 'err';
        errDiv.textContent = 'Failed: ' + e.message;
        const contentEl = document.getElementById('content');
        contentEl.textContent = '';
        contentEl.appendChild(errDiv);
      }
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function toMarkdown() {
      const c = document.getElementById('content');
      const text = c.innerText;
      const name = document.getElementById('sel').value || 'log';
      const md = `# ${name}\n\n\`\`\`\n${text}\n\`\`\``;
      navigator.clipboard.writeText(md).then(() => alert('Copied as Markdown'));
    }

    refresh();
  </script>
</body>
</html>
