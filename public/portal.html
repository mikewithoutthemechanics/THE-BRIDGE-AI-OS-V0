<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bridge AI — Voice Portal</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#00c8ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#02030a;--surface:rgba(5,12,25,0.85);--border:rgba(0,200,255,0.1);
  --cyan:#00e0ff;--green:#00ff88;--amber:#ffb020;--purple:#a855f7;
  --dim:#4a6070;--text:#d0dce6;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text)}

/* Top nav */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0.6rem 1.5rem;background:rgba(2,3,10,0.9);border-bottom:1px solid var(--border);backdrop-filter:blur(12px)}
.nav-brand{font-weight:700;font-size:1rem;color:var(--cyan);letter-spacing:0.5px}
.nav-links{display:flex;align-items:center;gap:1.2rem;font-size:0.8rem}
.nav-links a{color:var(--dim);text-decoration:none;transition:color 0.2s}
.nav-links a:hover{color:var(--cyan)}
.mic-indicator{display:flex;align-items:center;gap:0.4rem;font-size:0.75rem;color:var(--dim)}
.mic-dot{width:8px;height:8px;border-radius:50%;background:var(--dim);transition:background 0.3s,box-shadow 0.3s}
.mic-dot.active{background:var(--green);box-shadow:0 0 8px var(--green)}
.mic-dot.error{background:#ff3c5a;box-shadow:0 0 8px #ff3c5a}

/* Main layout */
.main{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding-top:48px;padding-bottom:60px;position:relative}

/* Brain canvas */
#brainCanvas{width:100%;height:100%;position:absolute;top:0;left:0;z-index:0}

/* Status text */
.voice-status{position:relative;z-index:10;margin-top:auto;margin-bottom:0.5rem;font-size:0.85rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);transition:color 0.4s;text-align:center}
.voice-status.listening{color:var(--green)}
.voice-status.thinking{color:var(--amber)}
.voice-status.speaking{color:var(--purple)}

/* Transcript */
.transcript{position:relative;z-index:10;width:90%;max-width:560px;min-height:120px;max-height:180px;overflow-y:auto;display:flex;flex-direction:column;gap:0.5rem;padding:0.75rem;margin-bottom:0.5rem;scrollbar-width:none}
.transcript::-webkit-scrollbar{display:none}
.transcript-msg{padding:0.5rem 0.75rem;border-radius:10px;font-size:0.85rem;line-height:1.45;max-width:85%;opacity:0;animation:fadeIn 0.4s ease forwards}
.transcript-msg.user{align-self:flex-end;color:var(--dim);background:rgba(255,255,255,0.04);text-align:right;border-bottom-right-radius:3px}
.transcript-msg.ai{align-self:flex-start;color:var(--cyan);background:rgba(0,224,255,0.06);border-bottom-left-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Text fallback */
.text-fallback{position:relative;z-index:10;width:90%;max-width:480px;display:none;margin-bottom:0.5rem}
.text-fallback-row{display:flex;gap:0.5rem}
.text-fallback-row input{flex:1;padding:0.55rem 0.75rem;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.85rem;outline:none;font-family:inherit}
.text-fallback-row input:focus{border-color:var(--cyan)}
.text-fallback-row button{padding:0.55rem 1rem;background:var(--cyan);color:#000;border:none;border-radius:8px;font-weight:600;font-size:0.8rem;cursor:pointer}

/* Economy bar */
.eco-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;justify-content:center;gap:2.5rem;padding:0.5rem 1rem;background:rgba(2,3,10,0.92);border-top:1px solid var(--border);backdrop-filter:blur(12px);font-size:0.7rem;color:var(--dim)}
.eco-item{display:flex;align-items:center;gap:0.35rem}
.eco-val{color:var(--cyan);font-weight:600}

/* Responsive */
@media(max-width:600px){
  .nav{padding:0.5rem 0.75rem}
  .nav-links{gap:0.7rem;font-size:0.7rem}
  .transcript{max-height:140px;min-height:90px}
  .eco-bar{gap:1rem;font-size:0.6rem}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">Bridge AI</div>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/economy.html">Economy</a>
    <div class="mic-indicator">
      <div class="mic-dot" id="micDot"></div>
      <span id="micLabel">Mic</span>
    </div>
  </div>
</nav>

<div class="main">
  <canvas id="brainCanvas"></canvas>
  <div class="voice-status" id="voiceStatus">Initializing...</div>
  <div class="transcript" id="transcript"></div>
  <div class="text-fallback" id="textFallback">
    <div class="text-fallback-row">
      <input type="text" id="textInput" placeholder="Type your message...">
      <button id="textSendBtn">Send</button>
    </div>
  </div>
</div>

<div class="eco-bar">
  <div class="eco-item">BRDG Circulating <span class="eco-val" id="ecoCirc">--</span></div>
  <div class="eco-item">Burned <span class="eco-val" id="ecoBurned">--</span></div>
  <div class="eco-item">Transactions <span class="eco-val" id="ecoTx">--</span></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
<script>
(function(){
'use strict';

// ===== STATE =====
let state = 'idle'; // idle | listening | thinking | speaking
let recognition = null;
let synth = window.speechSynthesis;
// Chrome loads voices async — preload them
if (synth && synth.onvoiceschanged !== undefined) {
  synth.onvoiceschanged = () => { synth.getVoices(); };
}
try { synth.getVoices(); } catch(_) {}
let silenceTimer = null;
let accumulatedText = '';
let conversationHistory = [];
const SILENCE_DELAY = 1500;
const MAX_TRANSCRIPT = 4;
let exchangeCount = 0;

const BRIDGE_KB = `You are Bridge, the AI business assistant for Bridge AI OS. You help businesses automate their operations with AI.

Your personality is warm, professional, and confident. You speak like a knowledgeable business advisor, not a salesperson. Keep responses concise, two to three sentences max since this is a voice conversation. Use natural conversational language. Be genuinely curious about their business.

About Bridge AI OS:
Bridge AI OS is an autonomous business platform with 35 AI agents that run your entire operation. It handles CRM, invoicing, quoting, ticketing, HR, compliance, and more with over 80 live API endpoints.

The 35 agents cover eight domains. Sales agents handle lead scoring, pipeline management, and deal closing. Marketing agents do content generation, SEO, and campaign automation. Research agents provide market analysis and competitor tracking. Legal agents draft contracts and monitor compliance. Finance agents manage invoicing, expenses, and treasury. Development agents handle code review and deployment. Trading agents run quantitative strategies and DeFi. Support agents route tickets and manage SLAs.

The platform runs on the BRDG token on Linea, which is an Ethereum Layer 2 network. The token is deflationary with a one percent burn on every transaction.

We accept payments through PayFast in South African Rand, Paystack in Nigerian Naira, and crypto including Ethereum and USDT.

Our plans are simple. The Starter plan is completely free and gives you 50 contacts, 10 invoices per month, and 5 AI tasks per day. The Pro plan costs 499 Rand per month and gives you unlimited contacts, 50 AI tasks per day, staking, and full CRM access. The Enterprise plan is 2499 Rand per month with white-label options, unlimited everything, dedicated agents, and priority support.

The platform includes 1266 skill modules, digital twins, voice AI, and a real-time token economy. It is built for Africa and scaling globally.

How you should sell:
First ask what business they run and what challenges they face. Listen carefully for pain points like manual invoicing, lack of CRM, team management issues, or lead tracking problems. Match their pain points to specific Bridge AI features. After three or four exchanges, naturally suggest a plan that fits their needs. Use soft closes like "Would you like to try that for free?" or "I can set that up for you right now". When the user shows clear interest or agrees, say something like "Great, let me take you to get started" and include [ROUTE:checkout] at the very end of your response. Never be pushy. If they hesitate, offer the free Starter plan. If they ask about pricing, give them the specific numbers.

Important rules for voice: Never use asterisks, bullet points, hashtags, or any markdown formatting. Never say "asterisk" or "hash". Speak in plain natural sentences only. Do not list items with dashes or numbers. Weave information into flowing sentences instead.`;

function getSystemPrompt() {
  let prompt = BRIDGE_KB;
  if (exchangeCount >= 4) {
    prompt += '\n\nCLOSING GUIDANCE: The conversation has progressed well. Start naturally guiding toward a plan recommendation. When the user agrees, include [ROUTE:checkout] at the end of your response.';
  }
  if (exchangeCount >= 6) {
    prompt += ' Be direct about next steps — recommend a specific plan and offer to set it up now.';
  }
  return prompt;
}
let speechSupported = true;

// ===== THREE.JS BRAIN =====
const canvas = document.getElementById('brainCanvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x02030a, 1);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0.2, 3);
camera.lookAt(0, 0, 0);

// Lighting
const ambientLight = new THREE.AmbientLight(0x112233, 0.6);
scene.add(ambientLight);
const pointLight1 = new THREE.PointLight(0x00e0ff, 1.2, 10);
pointLight1.position.set(2, 2, 3);
scene.add(pointLight1);
const pointLight2 = new THREE.PointLight(0x0088ff, 0.8, 10);
pointLight2.position.set(-2, -1, 2);
scene.add(pointLight2);
const rimLight = new THREE.PointLight(0x4400aa, 0.5, 10);
rimLight.position.set(0, -2, -3);
scene.add(rimLight);

// Brain geometry -- exact EHSA pattern
const geo = new THREE.SphereGeometry(1, 128, 128);
const pos = geo.attributes.position;
for (let i = 0; i < pos.count; i++) {
  let x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
  let n = Math.sin(x * 8) * Math.cos(y * 8) * Math.sin(z * 8);
  pos.setXYZ(i, x + n * 0.08, y + n * 0.08, z + n * 0.08);
}
const colors = [];
for (let i = 0; i < pos.count; i++) colors.push(0, 0.15, 0.2);
geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
geo.computeVertexNormals();

const mat = new THREE.MeshStandardMaterial({
  vertexColors: true, roughness: 0.3, metalness: 0.2,
  emissive: new THREE.Color(0x001111), emissiveIntensity: 1
});
const brain = new THREE.Mesh(geo, mat);
scene.add(brain);

// Regions -- exact EHSA pattern
const REGIONS = {
  frontal:   { start: 0,     size: 4000, signal: 'D', color: [0, 1, 0.8] },
  limbic:    { start: 4000,  size: 4000, signal: 'O', color: [1, 0.3, 0.5] },
  parietal:  { start: 8000,  size: 4000, signal: 'S', color: [0.3, 0.5, 1] },
  brainstem: { start: 12000, size: 3000, signal: 'E', color: [1, 0.8, 0] },
};

// State-based color targets
const STATE_COLORS = {
  idle:      { emissive: 0x001111, intensity: 1.0, regions: { frontal: 0.15, limbic: 0.05, parietal: 0.08, brainstem: 0.05 } },
  listening: { emissive: 0x003311, intensity: 1.8, regions: { frontal: 0.9,  limbic: 0.2,  parietal: 0.15, brainstem: 0.1 } },
  thinking:  { emissive: 0x221100, intensity: 2.2, regions: { frontal: 0.3,  limbic: 0.4,  parietal: 0.5,  brainstem: 0.8 } },
  speaking:  { emissive: 0x110033, intensity: 1.6, regions: { frontal: 0.2,  limbic: 0.6,  parietal: 0.8,  brainstem: 0.3 } },
};

let rotationSpeed = 0.003;
let targetRotationSpeed = 0.003;
let currentRegionIntensities = { frontal: 0.15, limbic: 0.05, parietal: 0.08, brainstem: 0.05 };
let pulsePhase = 0;

function activateRegion(name, intensity, t) {
  const r = REGIONS[name];
  if (!r) return;
  const col = geo.attributes.color;
  for (let i = r.start; i < r.start + r.size && i < pos.count; i++) {
    const px = pos.getX(i), py = pos.getY(i), pz = pos.getZ(i);
    const wave = Math.sin(px * 4 + t * 2) * Math.cos(py * 4 + t * 1.5) * 0.3 + 0.7;
    const pulse = Math.sin(pulsePhase + i * 0.001) * 0.15 + 0.85;
    const factor = intensity * wave * pulse;
    col.setXYZ(i,
      r.color[0] * factor,
      r.color[1] * factor,
      r.color[2] * factor
    );
  }
}

function resetColors() {
  const col = geo.attributes.color;
  for (let i = 0; i < pos.count; i++) {
    col.setXYZ(i, 0, 0.15, 0.2);
  }
}

function updateBrainVisuals(t) {
  const sc = STATE_COLORS[state];

  // Smooth rotation speed transition
  targetRotationSpeed = state === 'idle' ? 0.003 : state === 'listening' ? 0.008 : state === 'thinking' ? 0.012 : 0.006;
  rotationSpeed += (targetRotationSpeed - rotationSpeed) * 0.05;
  brain.rotation.y += rotationSpeed;
  brain.rotation.x = Math.sin(t * 0.5) * 0.05;

  // Pulse
  pulsePhase += state === 'thinking' ? 0.08 : state === 'listening' ? 0.05 : 0.02;

  // Vertex distortion pulse
  const origPos = geo.getAttribute('position');
  for (let i = 0; i < origPos.count; i++) {
    let x = origPos.getX(i), y = origPos.getY(i), z = origPos.getZ(i);
    const len = Math.sqrt(x * x + y * y + z * z);
    if (len > 0) {
      const baseLen = 1.0;
      const n = Math.sin(x * 8) * Math.cos(y * 8) * Math.sin(z * 8);
      const pulse = state !== 'idle' ? Math.sin(pulsePhase + i * 0.002) * 0.01 : 0;
      const target = baseLen + n * 0.08 + pulse;
      const scale = target / len;
      origPos.setXYZ(i, x * scale, y * scale, z * scale);
    }
  }
  origPos.needsUpdate = true;

  // Reset then activate regions
  resetColors();
  for (const [name, region] of Object.entries(REGIONS)) {
    const targetI = sc.regions[name];
    currentRegionIntensities[name] += (targetI - currentRegionIntensities[name]) * 0.08;
    activateRegion(name, currentRegionIntensities[name], t);
  }
  geo.attributes.color.needsUpdate = true;

  // Emissive color transition
  const targetEmissive = new THREE.Color(sc.emissive);
  mat.emissive.lerp(targetEmissive, 0.06);
  mat.emissiveIntensity += (sc.intensity - mat.emissiveIntensity) * 0.05;

  // Point light color shifts
  if (state === 'listening') {
    pointLight1.color.lerp(new THREE.Color(0x00ff88), 0.05);
  } else if (state === 'thinking') {
    pointLight1.color.lerp(new THREE.Color(0xffaa00), 0.05);
  } else if (state === 'speaking') {
    pointLight1.color.lerp(new THREE.Color(0x8844ff), 0.05);
  } else {
    pointLight1.color.lerp(new THREE.Color(0x00e0ff), 0.05);
  }
}

// Animation loop
function animate() {
  requestAnimationFrame(animate);
  const t = performance.now() * 0.001;
  updateBrainVisuals(t);
  renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ===== UI HELPERS =====
const statusEl = document.getElementById('voiceStatus');
const transcriptEl = document.getElementById('transcript');
const micDot = document.getElementById('micDot');
const micLabel = document.getElementById('micLabel');

function setState(newState) {
  state = newState;
  statusEl.className = 'voice-status ' + newState;
  switch (newState) {
    case 'idle':
      statusEl.textContent = 'Listening...';
      micDot.className = 'mic-dot active';
      micLabel.textContent = 'Live';
      break;
    case 'listening':
      statusEl.textContent = 'Listening...';
      micDot.className = 'mic-dot active';
      micLabel.textContent = 'Hearing you';
      break;
    case 'thinking':
      statusEl.textContent = 'Thinking...';
      micDot.className = 'mic-dot';
      micLabel.textContent = 'Processing';
      break;
    case 'speaking':
      statusEl.textContent = 'Speaking...';
      micDot.className = 'mic-dot';
      micLabel.textContent = 'Responding';
      break;
  }
}

function addTranscriptMessage(role, text) {
  const msg = document.createElement('div');
  msg.className = 'transcript-msg ' + role;
  msg.textContent = text;
  transcriptEl.appendChild(msg);

  // Keep only last MAX_TRANSCRIPT messages
  while (transcriptEl.children.length > MAX_TRANSCRIPT) {
    transcriptEl.removeChild(transcriptEl.firstChild);
  }
  transcriptEl.scrollTop = transcriptEl.scrollHeight;
}

// ===== LLM API =====
async function sendToLLM(userText) {
  setState('thinking');
  addTranscriptMessage('user', userText);
  conversationHistory.push({ role: 'user', content: userText });
  exchangeCount++;

  try {
    const apiKey = localStorage.getItem('brdg_api_key') || '';
    const headers = { 'Content-Type': 'application/json' };
    if (apiKey) headers['X-API-Key'] = apiKey;

    const resp = await fetch('/api/llm/infer', {
      method: 'POST',
      headers,
      body: JSON.stringify({
        prompt: userText,
        system: getSystemPrompt(),
        messages: conversationHistory.slice(-8)
      })
    });

    const data = await resp.json();
    console.log('[Bridge AI] LLM response:', data);
    if (!resp.ok || data.error) throw new Error(data.error || 'API error ' + resp.status);
    let reply = data.text || data.response || data.result || data.output || 'I received your message.';

    // Check for checkout route marker
    const shouldRoute = reply.includes('[ROUTE:checkout]');
    reply = reply.replace(/\[ROUTE:checkout\]/g, '').trim();

    conversationHistory.push({ role: 'assistant', content: reply });
    addTranscriptMessage('ai', reply);

    if (shouldRoute) {
      // Capture lead data immediately
      try {
        fetch('/api/leads/capture', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            conversation: conversationHistory,
            source: 'voice_portal',
            score: exchangeCount * 15,
            ts: Date.now()
          })
        });
      } catch (_) {}

      // Speak the closing message, THEN redirect after voice finishes
      speakThenDo(reply, () => {
        addTranscriptMessage('ai', 'Taking you to sign up now...');
        setTimeout(() => { window.location.href = '/checkout.html'; }, 1500);
      });
    } else {
      speak(reply);
    }
  } catch (e) {
    const fallback = 'Sorry, I could not process that right now.';
    addTranscriptMessage('ai', fallback);
    speak(fallback);
  }
}

// ===== SPEECH SYNTHESIS =====
// Speak text, then call callback when done (used for checkout redirect)
function speakThenDo(text, callback) {
  setState('speaking');
  if (recognition) { try { recognition.stop(); } catch(e) {} }
  if (!synth || !text) { if (callback) callback(); return; }
  synth.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = 1.0;
  utter.pitch = 1.0;
  const voices = synth.getVoices();
  const preferred = voices.find(v => /samantha|karen|google.*female|zira|microsoft.*natural/i.test(v.name)) || voices.find(v => /female|fiona/i.test(v.name)) || voices[0];
  if (preferred) utter.voice = preferred;
  utter.onend = () => { setState('idle'); if (callback) callback(); };
  utter.onerror = () => { setState('idle'); if (callback) callback(); };
  synth.speak(utter);
  // Chrome keepalive
  const ka = setInterval(() => { if (!synth.speaking) { clearInterval(ka); return; } synth.pause(); synth.resume(); }, 5000);
  utter.onend = () => { clearInterval(ka); setState('idle'); if (callback) callback(); };
  utter.onerror = () => { clearInterval(ka); setState('idle'); if (callback) callback(); };
}

function speak(text) {
  setState('speaking');
  if (recognition) {
    try { recognition.stop(); } catch(e) {}
  }

  if (!synth || !text) {
    setState('idle');
    startRecognition();
    return;
  }

  synth.cancel();

  // Split long text into chunks (Chrome cuts off utterances >~200 chars)
  const chunks = [];
  const sentences = text.match(/[^.!?]+[.!?]+|[^.!?]+$/g) || [text];
  let current = '';
  for (const s of sentences) {
    if ((current + s).length > 180) {
      if (current) chunks.push(current.trim());
      current = s;
    } else {
      current += s;
    }
  }
  if (current.trim()) chunks.push(current.trim());

  // Pick voice once
  const voices = synth.getVoices();
  const preferred = voices.find(v => /samantha|karen|google.*female|zira|microsoft.*natural/i.test(v.name))
    || voices.find(v => /female|fiona/i.test(v.name))
    || voices[0];

  let idx = 0;
  function speakNext() {
    if (idx >= chunks.length) {
      setState('idle');
      startRecognition();
      return;
    }
    const utter = new SpeechSynthesisUtterance(chunks[idx]);
    utter.rate = 1.0;
    utter.pitch = 1.0;
    if (preferred) utter.voice = preferred;
    utter.onend = () => { idx++; speakNext(); };
    utter.onerror = () => { idx++; speakNext(); };
    synth.speak(utter);

    // Chrome bug: long utterances pause. Keepalive workaround.
    const keepAlive = setInterval(() => {
      if (!synth.speaking) { clearInterval(keepAlive); return; }
      synth.pause(); synth.resume();
    }, 5000);
    utter.onend = () => { clearInterval(keepAlive); idx++; speakNext(); };
    utter.onerror = () => { clearInterval(keepAlive); idx++; speakNext(); };
  }
  speakNext();
}

// ===== SPEECH RECOGNITION =====
function initRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    speechSupported = false;
    showTextFallback();
    return;
  }

  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onresult = (event) => {
    if (state === 'thinking' || state === 'speaking') return;

    setState('listening');
    let finalText = '';
    let interimText = '';

    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        finalText += transcript + ' ';
      } else {
        interimText += transcript;
      }
    }

    if (finalText) {
      accumulatedText += finalText;
    }

    // Reset silence timer on any speech
    clearTimeout(silenceTimer);
    silenceTimer = setTimeout(() => {
      const text = accumulatedText.trim();
      if (text.length > 0) {
        accumulatedText = '';
        try { recognition.stop(); } catch(e) {}
        sendToLLM(text);
      } else {
        setState('idle');
      }
    }, SILENCE_DELAY);
  };

  recognition.onend = () => {
    // Auto-restart if we're in idle/listening state
    if (state === 'idle' || state === 'listening') {
      setTimeout(() => {
        if (state === 'idle' || state === 'listening') {
          startRecognition();
        }
      }, 200);
    }
  };

  recognition.onerror = (e) => {
    if (e.error === 'no-speech' || e.error === 'aborted') {
      // Normal -- will restart via onend
      return;
    }
    if (e.error === 'not-allowed') {
      micDot.className = 'mic-dot error';
      micLabel.textContent = 'Denied';
      statusEl.textContent = 'Microphone access denied. Please allow mic access and reload.';
      showTextFallback();
      return;
    }
    console.warn('Speech recognition error:', e.error);
  };
}

function startRecognition() {
  if (!recognition) return;
  try {
    accumulatedText = '';
    recognition.start();
  } catch (e) {
    // Already started -- ignore
  }
}

function showTextFallback() {
  document.getElementById('textFallback').style.display = 'block';
  if (!speechSupported) {
    statusEl.textContent = 'Voice not supported in this browser. Type below.';
  }
}

// Text fallback handlers
document.getElementById('textSendBtn').addEventListener('click', () => {
  const input = document.getElementById('textInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  sendToLLM(text);
});
document.getElementById('textInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    document.getElementById('textSendBtn').click();
  }
});

// ===== ECONOMY STATS =====
async function fetchEconomyStats() {
  try {
    const apiKey = localStorage.getItem('brdg_api_key') || '';
    const headers = {};
    if (apiKey) headers['X-API-Key'] = apiKey;
    const resp = await fetch('/api/economy/stats', { headers });
    if (!resp.ok) return;
    const d = await resp.json();
    const fmt = (n) => n != null ? Number(n).toLocaleString() : '--';
    document.getElementById('ecoCirc').textContent = fmt(d.total_circulating || d.circulating);
    document.getElementById('ecoBurned').textContent = fmt(d.burned || d.total_burned);
    document.getElementById('ecoTx').textContent = fmt(d.transactions || d.total_transactions || d.tx_count);
  } catch (e) { /* silent */ }
}

// ===== INIT =====
function init() {
  // Load voices (some browsers need this)
  synth.getVoices();
  if (synth.onvoiceschanged !== undefined) {
    synth.onvoiceschanged = () => synth.getVoices();
  }

  initRecognition();
  fetchEconomyStats();
  setInterval(fetchEconomyStats, 60000);

  // Greeting after a short delay
  setTimeout(() => {
    const greeting = "Hi, I'm Bridge. How can I help you today?";
    addTranscriptMessage('ai', greeting);
    speak(greeting);
  }, 1200);
}

init();

})();
