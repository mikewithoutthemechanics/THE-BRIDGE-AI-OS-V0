<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Embodied Face — Stress Memory</title>
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<style>html,body{width:100%;height:100%;margin:0;overflow:hidden;}canvas{width:100%;height:100%;}</style>
</head>
<body>
<canvas id="renderCanvas"></canvas>
<script>

const canvas = document.getElementById("renderCanvas");
const engine = new BABYLON.Engine(canvas,true);

const createScene = () => {
const scene = new BABYLON.Scene(engine);
scene.clearColor = new BABYLON.Color4(0.02,0.02,0.05,1);

const camera = new BABYLON.ArcRotateCamera("cam",Math.PI/2,Math.PI/2.3,5,BABYLON.Vector3.Zero(),scene);
camera.attachControl(canvas,true);
new BABYLON.HemisphericLight("light",new BABYLON.Vector3(0,1,0),scene).intensity = 1;

const head = BABYLON.MeshBuilder.CreateSphere("head",{diameterX:1.6,diameterY:2,diameterZ:1.6,segments:128},scene);
const mat = new BABYLON.PBRMaterial("skin",scene);
mat.albedoColor = new BABYLON.Color3(1,0.78,0.65);
mat.roughness = 0.5;
head.material = mat;

const base = head.getVerticesData(BABYLON.VertexBuffer.PositionKind);
let current = base.slice();
let velocity = new Float32Array(base.length);

function isBoneLocked(vx,vy,vz){ if(vz<-0.2)return true; if(vy>0.8)return true; return false; }

function accumulateForce(anchor,dir,radius,strength,forceArray,positions){
for(let i=0;i<base.length;i+=3){
let vx=positions[i], vy=positions[i+1], vz=positions[i+2];
if(isBoneLocked(vx,vy,vz))continue;
let dx=vx-anchor.x, dy=vy-anchor.y, dz=vz-anchor.z;
let dist=Math.sqrt(dx*dx+dy*dy+dz*dz);
if(dist<radius){
let falloff=Math.exp(-(dist*dist)/(radius*radius));
forceArray[i]+=dir.x*strength*falloff;
forceArray[i+1]+=dir.y*strength*falloff;
forceArray[i+2]+=dir.z*strength*falloff;
}
}
}

scene.registerBeforeRender(()=>{
let t=performance.now()*0.002;
let smile=(Math.sin(t)+1)/2;
let blink=Math.max(0,Math.sin(t*3));

let force = new Float32Array(base.length);
accumulateForce(new BABYLON.Vector3(-0.4,-0.2,0.6),new BABYLON.Vector3(-0.2,0.3,0),0.6,0.3*smile,force,current);
accumulateForce(new BABYLON.Vector3(0.4,-0.2,0.6),new BABYLON.Vector3(0.2,0.3,0),0.6,0.3*smile,force,current);
accumulateForce(new BABYLON.Vector3(-0.35,0.3,0.7),new BABYLON.Vector3(0,-0.2,0),0.4,0.25*blink,force,current);
accumulateForce(new BABYLON.Vector3(0.35,0.3,0.7),new BABYLON.Vector3(0,-0.2,0),0.4,0.25*blink,force,current);

for(let i=0;i<base.length;i+=3){
let vx=current[i], vy=current[i+1], vz=current[i+2];
if(isBoneLocked(vx,vy,vz)){
current[i]=base[i]; current[i+1]=base[i+1]; current[i+2]=base[i+2];
velocity[i]=0; velocity[i+1]=0; velocity[i+2]=0;
continue;
}
let mag=Math.sqrt(force[i]*force[i]+force[i+1]*force[i+1]+force[i+2]*force[i+2]);
if(mag>0.3){
force[i]*=0.3/mag; force[i+1]*=0.3/mag; force[i+2]*=0.3/mag;
}
velocity[i]=velocity[i]*0.9+force[i]*0.08;
velocity[i+1]=velocity[i+1]*0.9+force[i+1]*0.08;
velocity[i+2]=velocity[i+2]*0.9+force[i+2]*0.08;

current[i]+=velocity[i];
current[i+1]+=velocity[i+1];
current[i+2]+=velocity[i+2];

let dx=current[i]-base[i], dy=current[i+1]-base[i+1], dz=current[i+2]-base[i+2];
let strain=Math.sqrt(dx*dx+dy*dy+dz*dz);
let maxStrain=0.35;
if(strain>maxStrain){
let ratio=maxStrain/strain;
current[i]=base[i]+dx*ratio;
current[i+1]=base[i+1]+dy*ratio;
current[i+2]=base[i+2]+dz*ratio;
}
}

head.updateVerticesData(BABYLON.VertexBuffer.PositionKind,current);
});
return scene;
};

const scene = createScene();
engine.runRenderLoop(()=>scene.render());
window.addEventListener("resize",()=>engine.resize());

</script>
</body>
</html>
