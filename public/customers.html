<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers — Bridge AI OS</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/bridge-tokens.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            min-height: 100vh;
            background: var(--bg-0);
            font-family: var(--font-ui);
            color: var(--text-primary);
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 80%, rgba(99, 255, 218, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(167, 139, 250, 0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        .shell { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 32px 20px 60px; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-8); flex-wrap: wrap; gap: var(--gap); }
        .header h1 { font-size: var(--text-3xl); font-weight: var(--weight-bold); letter-spacing: var(--tracking-tight); }
        .header h1 span { color: var(--cyan); }

        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--gap); margin-bottom: var(--space-8); }
        .stat-card {
            background: var(--card-bg);
            border: var(--border-thin) solid var(--border);
            border-radius: var(--radius-md);
            padding: var(--space-5);
            transition: border-color var(--duration-normal) var(--ease-default);
        }
        .stat-card:hover { border-color: var(--cyan); }
        .stat-label { font-size: var(--text-xs); color: var(--text-muted); text-transform: uppercase; letter-spacing: var(--tracking-widest); font-family: var(--font-mono); margin-bottom: var(--space-2); }
        .stat-value { font-size: var(--text-2xl); font-weight: var(--weight-bold); color: var(--cyan); }

        .section-title { font-size: var(--text-lg); font-weight: var(--weight-semibold); margin-bottom: var(--space-4); }

        .table-wrap {
            background: var(--card-bg);
            border: var(--border-thin) solid var(--border);
            border-radius: var(--radius-md);
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: var(--text-xs); color: var(--text-muted); text-transform: uppercase; letter-spacing: var(--tracking-widest); font-family: var(--font-mono); padding: var(--space-3) var(--space-4); border-bottom: var(--border-thin) solid var(--border); background: var(--bg-2); }
        td { padding: var(--space-3) var(--space-4); font-size: var(--text-sm); border-bottom: var(--border-thin) solid var(--border); cursor: pointer; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(99, 255, 218, 0.03); }

        .badge-active { color: var(--alive); border: 1px solid rgba(0,255,136,0.3); background: rgba(0,255,136,0.08); display: inline-block; padding: 2px 10px; border-radius: var(--radius-full); font-size: var(--text-xs); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: var(--tracking-wide); }
        .badge-inactive { color: var(--text-muted); border: 1px solid var(--unknown); background: rgba(102,102,102,0.08); display: inline-block; padding: 2px 10px; border-radius: var(--radius-full); font-size: var(--text-xs); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: var(--tracking-wide); }
        .badge-churned { color: var(--offline); border: 1px solid rgba(255,0,51,0.3); background: rgba(255,0,51,0.08); display: inline-block; padding: 2px 10px; border-radius: var(--radius-full); font-size: var(--text-xs); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: var(--tracking-wide); }

        .empty { text-align: center; padding: var(--space-10); color: var(--text-muted); font-family: var(--font-mono); font-size: var(--text-sm); }
        .error-msg { color: var(--offline); font-size: var(--text-sm); font-family: var(--font-mono); padding: var(--space-4); text-align: center; }

        /* Modal overlay */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: var(--z-overlay); align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--bg-1);
            border: var(--border-thin) solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--space-8);
            max-width: 500px;
            width: 90%;
            position: relative;
        }
        .modal h2 { font-size: var(--text-xl); margin-bottom: var(--space-4); }
        .modal-close { position: absolute; top: var(--space-4); right: var(--space-4); background: none; border: none; color: var(--text-muted); font-size: var(--text-xl); cursor: pointer; }
        .modal-close:hover { color: var(--text-primary); }
        .detail-row { display: flex; justify-content: space-between; padding: var(--space-2) 0; border-bottom: var(--border-thin) solid var(--border); font-size: var(--text-sm); }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { color: var(--text-muted); }
        .detail-value { color: var(--text-primary); font-family: var(--font-mono); }

        /* Add form */
        .form-card {
            background: var(--card-bg);
            border: var(--border-thin) solid var(--border);
            border-radius: var(--radius-md);
            padding: var(--space-6);
            margin-bottom: var(--space-8);
            display: none;
        }
        .form-card.open { display: block; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap); margin-bottom: var(--space-4); }
        label { font-size: var(--text-sm); color: var(--text-secondary); display: block; margin-bottom: var(--space-1); }
        input, select {
            width: 100%;
            padding: var(--space-3);
            background: var(--bg-2);
            border: var(--border-thin) solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: var(--font-ui);
            font-size: var(--text-sm);
            outline: none;
            transition: border-color var(--duration-normal) var(--ease-default);
        }
        input:focus, select:focus { border-color: var(--cyan); }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .stats-row { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
<div class="shell">
    <div class="header">
        <h1><span>Customers</span> — Bridge AI OS</h1>
        <button class="btn-primary" id="toggleAdd">Add Customer</button>
    </div>

    <div class="stats-row">
        <div class="stat-card"><div class="stat-label">Total Customers</div><div class="stat-value" id="s-total">--</div></div>
        <div class="stat-card"><div class="stat-label">Active</div><div class="stat-value" id="s-active">--</div></div>
        <div class="stat-card"><div class="stat-label">MRR</div><div class="stat-value" id="s-mrr">--</div></div>
    </div>

    <div class="form-card" id="addForm">
        <div class="section-title">Add Customer</div>
        <form id="customerForm">
            <div class="form-grid">
                <div><label>Name</label><input id="f-name" required placeholder="Customer name"></div>
                <div><label>Email</label><input id="f-email" type="email" required placeholder="email@example.com"></div>
            </div>
            <div class="form-grid">
                <div><label>Plan</label><input id="f-plan" placeholder="e.g. Pro, Enterprise"></div>
                <div>
                    <label>Status</label>
                    <select id="f-status"><option value="active">Active</option><option value="inactive">Inactive</option></select>
                </div>
            </div>
            <div style="margin-top:var(--space-4)"><button type="submit" class="btn-primary">Save Customer</button></div>
        </form>
    </div>

    <div class="section-title">All Customers</div>
    <div class="table-wrap">
        <table>
            <thead><tr><th>Name</th><th>Email</th><th>Plan</th><th>Status</th><th>Revenue</th></tr></thead>
            <tbody id="cust-body"><tr><td colspan="5" class="empty">Loading...</td></tr></tbody>
        </table>
    </div>
</div>

<!-- Detail modal -->
<div class="modal-overlay" id="detailModal">
    <div class="modal">
        <button class="modal-close" id="modalClose">&times;</button>
        <h2 id="modal-name">Customer</h2>
        <div id="modal-details"></div>
    </div>
</div>

<script>
(function() {
    var body = document.getElementById('cust-body');
    var form = document.getElementById('customerForm');
    var addCard = document.getElementById('addForm');
    var modal = document.getElementById('detailModal');
    var modalDetails = document.getElementById('modal-details');
    var modalName = document.getElementById('modal-name');

    document.getElementById('toggleAdd').addEventListener('click', function() {
        addCard.classList.toggle('open');
    });
    document.getElementById('modalClose').addEventListener('click', function() {
        modal.classList.remove('open');
    });
    modal.addEventListener('click', function(e) {
        if (e.target === modal) modal.classList.remove('open');
    });

    function fmt(n) { return '$' + Number(n || 0).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}); }

    function statusBadge(s) {
        var cls = 'badge-' + (s || 'inactive').toLowerCase();
        if (cls === 'badge-churned') cls = 'badge-churned';
        else if (cls !== 'badge-active') cls = 'badge-inactive';
        return cls;
    }

    function renderRow(c) {
        var tr = document.createElement('tr');
        var id = c.id || c._id;

        var tdName = document.createElement('td');
        tdName.textContent = c.name || '--';

        var tdEmail = document.createElement('td');
        tdEmail.textContent = c.email || '--';
        tdEmail.style.fontFamily = 'var(--font-mono)';

        var tdPlan = document.createElement('td');
        tdPlan.textContent = c.plan || '--';

        var tdStatus = document.createElement('td');
        var badge = document.createElement('span');
        badge.className = statusBadge(c.status);
        badge.textContent = c.status || 'inactive';
        tdStatus.appendChild(badge);

        var tdRev = document.createElement('td');
        tdRev.style.fontFamily = 'var(--font-mono)';
        tdRev.textContent = fmt(c.revenue || c.mrr);

        tr.appendChild(tdName);
        tr.appendChild(tdEmail);
        tr.appendChild(tdPlan);
        tr.appendChild(tdStatus);
        tr.appendChild(tdRev);

        tr.addEventListener('click', function() { showDetail(id); });
        return tr;
    }

    function load() {
        fetch('/api/customers').then(function(r) { return r.json(); }).then(function(data) {
            var list = Array.isArray(data) ? data : (data.customers || data.data || []);
            updateStats(list);
            body.replaceChildren();
            if (!list.length) {
                var tr = document.createElement('tr');
                var td = document.createElement('td');
                td.colSpan = 5; td.className = 'empty'; td.textContent = 'No customers yet';
                tr.appendChild(td); body.appendChild(tr);
                return;
            }
            list.forEach(function(c) { body.appendChild(renderRow(c)); });
        }).catch(function() {
            body.replaceChildren();
            var tr = document.createElement('tr');
            var td = document.createElement('td');
            td.colSpan = 5; td.className = 'error-msg'; td.textContent = 'Failed to load customers';
            tr.appendChild(td); body.appendChild(tr);
        });
    }

    function updateStats(list) {
        document.getElementById('s-total').textContent = list.length;
        var active = list.filter(function(c) { return c.status && c.status.toLowerCase() === 'active'; }).length;
        document.getElementById('s-active').textContent = active;
        var mrr = list.reduce(function(s, c) { return s + Number(c.revenue || c.mrr || 0); }, 0);
        document.getElementById('s-mrr').textContent = fmt(mrr);
    }

    function showDetail(id) {
        fetch('/api/customers/' + encodeURIComponent(id)).then(function(r) { return r.json(); }).then(function(c) {
            modalName.textContent = c.name || 'Customer';
            modalDetails.replaceChildren();
            var fields = [
                ['Email', c.email], ['Plan', c.plan], ['Status', c.status],
                ['Revenue', fmt(c.revenue || c.mrr)], ['Created', c.created_at || c.createdAt || '--']
            ];
            fields.forEach(function(f) {
                var row = document.createElement('div');
                row.className = 'detail-row';
                var lbl = document.createElement('span');
                lbl.className = 'detail-label';
                lbl.textContent = f[0];
                var val = document.createElement('span');
                val.className = 'detail-value';
                val.textContent = f[1] || '--';
                row.appendChild(lbl);
                row.appendChild(val);
                modalDetails.appendChild(row);
            });
            modal.classList.add('open');
        }).catch(function() { alert('Failed to load customer details'); });
    }

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        var payload = {
            name: document.getElementById('f-name').value,
            email: document.getElementById('f-email').value,
            plan: document.getElementById('f-plan').value,
            status: document.getElementById('f-status').value
        };
        fetch('/api/customers', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(function(r) { return r.json(); }).then(function() {
            form.reset();
            addCard.classList.remove('open');
            load();
        }).catch(function() { alert('Failed to add customer'); });
    });

    load();
})();
</script>
<script src="/bridge-nav.js"></script>
</body>
</html>
