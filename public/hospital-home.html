<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>HOSPITAL IN A BOX - Bridge AI OS</title><style>*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#050a0f;--s:#0d1620;--b:#1a2d40;--a:#ffd166;--t:#c8dce8;--d:#4d6678}body{background:var(--bg);color:var(--t);font-family:system-ui,monospace}.hero{text-align:center;padding:3rem 1.5rem 2rem;border-bottom:2px solid var(--b)}.hero .icon{font-size:4rem}.hero h1{color:var(--a);font-size:1.8rem;letter-spacing:.2em}.hero .tag{color:var(--d);font-size:.8rem;margin-top:.3rem}.hero .desc{font-size:.85rem;max-width:600px;margin:1rem auto;line-height:1.6}.features{max-width:700px;margin:1.5rem auto;padding:0 1rem}.features h2{color:var(--a);font-size:.8rem;letter-spacing:.12em;margin-bottom:.8rem;border-bottom:1px solid var(--b);padding-bottom:.3rem}.feat{background:var(--s);border:1px solid var(--b);border-radius:6px;padding:.8rem;margin-bottom:.5rem}.feat h3{font-size:.8rem;color:var(--a)}.feat p{font-size:.7rem;color:var(--d)}.actions{text-align:center;padding:2rem}.btn{display:inline-block;padding:.6rem 1.5rem;border-radius:6px;text-decoration:none;font-size:.8rem;font-weight:600;margin:.3rem}.btn-p{background:var(--a);color:#050a0f}.btn-s{border:1px solid var(--a);color:var(--a)}.footer{text-align:center;padding:1rem;font-size:.6rem;color:var(--d);border-top:1px solid var(--b)}.footer a{color:var(--a);text-decoration:none}#data{max-width:700px;margin:1rem auto;padding:.8rem;background:var(--s);border:1px solid var(--b);border-radius:6px;font-size:.65rem;font-family:monospace;max-height:200px;overflow-y:auto;color:var(--d);white-space:pre-wrap}</style><link rel="stylesheet" href="/bridge-tokens.css"></head><body><div class="hero"><div class="icon">&#x1F3D7;</div><h1>HOSPITAL IN A BOX</h1><div class="tag">Complete Hospital Management</div><div class="desc">EMR, pharmacy, billing, telemedicine, AI diagnostics.</div></div><div class="features"><h2>CAPABILITIES</h2><div class="feat"><h3>EMR System</h3><p>Full patient history</p></div><div class="feat"><h3>AI Diagnostics</h3><p>Image analysis</p></div><div class="feat"><h3>Billing</h3><p>Insurance and payments</p></div></div><div id="data">Loading...</div><div class="actions"><a class="btn btn-p" href="/">DASHBOARD</a> <a class="btn btn-s" href="/platforms.html">NETWORK</a> <a class="btn btn-s" href="/onboarding.html">JOIN</a></div><div class="footer">Part of <a href="https://go.ai-os.co.za">Bridge AI OS</a> | <a href="/sitemap.html">Sitemap</a></div><script>fetch("/api/ehsa/services").then(r=>r.json()).then(d=>{var el=document.getElementById("data");if(d.ok&&d.services){var svcs=Object.entries(d.services);el.textContent="Hospital Services\n─────────────────────\n"+svcs.map(function(e){return"[ "+e[0]+" ] R"+e[1].base+" "+e[1].unit+" ("+e[1].currency+")"}).join("\n")+"\n\nTotal: "+svcs.length+" services available"}else{el.textContent=JSON.stringify(d,null,2)}}).catch(()=>{document.getElementById("data").style.display="none"})</script><script src="/bridge-nav.js"></script></body></html>
