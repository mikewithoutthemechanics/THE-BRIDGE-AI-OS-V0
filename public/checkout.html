<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bridge AI OS — Checkout</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050a0f;--surface:#0a1520;--border:#1a2d40;--cyan:#00c8ff;--green:#00e57b;--dim:#4d6678;--text:#e0e8f0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.checkout{max-width:460px;width:100%;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.5rem}
h1{font-size:1.5rem;margin-bottom:.5rem}
.sub{color:var(--dim);margin-bottom:2rem;font-size:.9rem}
label{display:block;font-size:.85rem;color:var(--dim);margin-bottom:.3rem;margin-top:1rem}
input,select{width:100%;padding:.7rem;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:1rem;outline:none}
input:focus,select:focus{border-color:var(--cyan)}
.plan-cards{display:flex;gap:.75rem;margin:1rem 0}
.plan-card{flex:1;padding:.75rem;border:1px solid var(--border);border-radius:8px;cursor:pointer;text-align:center;transition:all .2s}
.plan-card:hover,.plan-card.selected{border-color:var(--cyan);background:rgba(0,200,255,.05)}
.plan-card .name{font-weight:600;font-size:.9rem}
.plan-card .price{font-size:1.3rem;font-weight:800;color:var(--cyan);margin:.3rem 0}
.plan-card .price small{font-size:.7rem;color:var(--dim);font-weight:400}
.btn{display:block;width:100%;padding:.85rem;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:1.5rem;transition:all .2s}
.btn-pay{background:linear-gradient(135deg,var(--cyan),#0090cc);color:#000}
.btn-pay:hover{opacity:.9}
.btn-pay:disabled{opacity:.5;cursor:not-allowed}
.msg{margin-top:1rem;padding:.75rem;border-radius:8px;font-size:.85rem;display:none}
.msg.error{display:block;background:rgba(255,60,90,.1);color:#ff3c5a;border:1px solid rgba(255,60,90,.2)}
.msg.success{display:block;background:rgba(0,229,123,.1);color:var(--green);border:1px solid rgba(0,229,123,.2)}
.secure{text-align:center;margin-top:1.5rem;color:var(--dim);font-size:.75rem}
a{color:var(--cyan)}
</style>
</head>
<body>
<div class="checkout">
  <h1>Subscribe to Bridge AI OS</h1>
  <p class="sub">Select a plan, enter your details, and pay securely via PayFast.</p>

  <label>Plan</label>
  <div class="plan-cards">
    <div class="plan-card" data-plan="starter" onclick="selectPlan('starter')">
      <div class="name">Starter</div>
      <div class="price">R0<small>/mo</small></div>
    </div>
    <div class="plan-card selected" data-plan="pro" onclick="selectPlan('pro')">
      <div class="name">Pro</div>
      <div class="price">R499<small>/mo</small></div>
    </div>
    <div class="plan-card" data-plan="enterprise" onclick="selectPlan('enterprise')">
      <div class="name">Enterprise</div>
      <div class="price">R2,499<small>/mo</small></div>
    </div>
  </div>

  <label for="name">Full Name</label>
  <input type="text" id="name" placeholder="Ryan Saunders" required>

  <label for="email">Email</label>
  <input type="email" id="email" placeholder="you@company.com" required>

  <button class="btn btn-pay" id="payBtn" onclick="checkout()">Pay R499 via PayFast</button>

  <div class="msg" id="msg"></div>

  <p class="secure">Secured by PayFast (ZA) &middot; PCI DSS Compliant &middot; <a href="/">Back to home</a></p>
</div>

<script>
let selectedPlan = 'pro';

function selectPlan(plan) {
  selectedPlan = plan;
  document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('selected'));
  document.querySelector(`[data-plan="${plan}"]`).classList.add('selected');
  const prices = { starter: 0, pro: 499, enterprise: 2499 };
  const btn = document.getElementById('payBtn');
  if (plan === 'starter') {
    btn.textContent = 'Get Started Free';
  } else {
    btn.textContent = `Pay R${prices[plan].toLocaleString()} via PayFast`;
  }
}

async function checkout() {
  const btn = document.getElementById('payBtn');
  const msg = document.getElementById('msg');
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();

  if (!email) { msg.className = 'msg error'; msg.textContent = 'Email is required.'; return; }

  btn.disabled = true;
  btn.textContent = 'Processing...';
  msg.className = 'msg'; msg.style.display = 'none';

  try {
    const r = await fetch('/api/checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ plan: selectedPlan, email, name }),
    });
    const d = await r.json();

    if (!d.ok) {
      msg.className = 'msg error'; msg.textContent = d.error || 'Something went wrong.';
      btn.disabled = false; selectPlan(selectedPlan);
      return;
    }

    if (d.redirect) {
      window.location.href = d.redirect;
      return;
    }

    if (d.payfast_url) {
      msg.className = 'msg success'; msg.textContent = 'Redirecting to PayFast...';
      window.location.href = d.payfast_url;
    }
  } catch (e) {
    msg.className = 'msg error'; msg.textContent = 'Network error. Please try again.';
    btn.disabled = false; selectPlan(selectedPlan);
  }
}
</script>
</body>
</html>
