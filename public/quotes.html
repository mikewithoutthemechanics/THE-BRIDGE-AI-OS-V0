<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quotes — Bridge AI OS</title>
    <meta name="description" content="Quotes — Generate & Manage Quotes">
    <meta property="og:title" content="Quotes — Bridge AI OS">
    <meta property="og:description" content="Quotes — Generate & Manage Quotes">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://abaas.bridge-ai-os.com/quotes.html">
    <meta name="twitter:card" content="summary">
    <link rel="canonical" href="https://abaas.bridge-ai-os.com/quotes.html">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/bridge-tokens.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            min-height: 100vh;
            background: var(--bg-0);
            font-family: var(--font-ui);
            color: var(--text-primary);
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 80%, rgba(99, 255, 218, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(167, 139, 250, 0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        .shell { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 32px 20px 60px; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-8); }
        .header h1 { font-size: var(--text-3xl); font-weight: var(--weight-bold); letter-spacing: var(--tracking-tight); }
        .header h1 span { color: var(--cyan); }

        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--gap); margin-bottom: var(--space-8); }
        .stat-card {
            background: var(--card-bg);
            border: var(--border-thin) solid var(--border);
            border-radius: var(--radius-md);
            padding: var(--space-5);
            transition: border-color var(--duration-normal) var(--ease-default);
        }
        .stat-card:hover { border-color: var(--cyan); }
        .stat-label { font-size: var(--text-xs); color: var(--text-muted); text-transform: uppercase; letter-spacing: var(--tracking-widest); font-family: var(--font-mono); margin-bottom: var(--space-2); }
        .stat-value { font-size: var(--text-2xl); font-weight: var(--weight-bold); color: var(--cyan); }

        .section-title { font-size: var(--text-lg); font-weight: var(--weight-semibold); margin-bottom: var(--space-4); }

        .form-card {
            background: var(--card-bg);
            border: var(--border-thin) solid var(--border);
            border-radius: var(--radius-md);
            padding: var(--space-6);
            margin-bottom: var(--space-8);
        }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap); margin-bottom: var(--space-4); }
        .form-grid.full { grid-template-columns: 1fr; }
        label { font-size: var(--text-sm); color: var(--text-secondary); display: block; margin-bottom: var(--space-1); }
        input, textarea {
            width: 100%;
            padding: var(--space-3);
            background: var(--bg-2);
            border: var(--border-thin) solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: var(--font-ui);
            font-size: var(--text-sm);
            outline: none;
            transition: border-color var(--duration-normal) var(--ease-default);
        }
        input:focus, textarea:focus { border-color: var(--cyan); }
        textarea { resize: vertical; min-height: 60px; }

        .table-wrap {
            background: var(--card-bg);
            border: var(--border-thin) solid var(--border);
            border-radius: var(--radius-md);
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: var(--text-xs); color: var(--text-muted); text-transform: uppercase; letter-spacing: var(--tracking-widest); font-family: var(--font-mono); padding: var(--space-3) var(--space-4); border-bottom: var(--border-thin) solid var(--border); background: var(--bg-2); }
        td { padding: var(--space-3) var(--space-4); font-size: var(--text-sm); border-bottom: var(--border-thin) solid var(--border); }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(99, 255, 218, 0.03); }

        .badge { display: inline-block; padding: 2px 10px; border-radius: var(--radius-full); font-size: var(--text-xs); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: var(--tracking-wide); }
        .badge-draft { color: var(--text-muted); border: 1px solid var(--unknown); background: rgba(102,102,102,0.08); }
        .badge-sent { color: var(--degraded); border: 1px solid rgba(255,170,0,0.3); background: rgba(255,170,0,0.08); }
        .badge-accepted { color: var(--alive); border: 1px solid rgba(0,255,136,0.3); background: rgba(0,255,136,0.08); }
        .badge-rejected { color: var(--offline); border: 1px solid rgba(255,0,51,0.3); background: rgba(255,0,51,0.08); }

        .btn-sm { padding: 4px 12px; font-size: var(--text-xs); border-radius: var(--radius-sm); border: var(--border-thin) solid var(--cyan); background: transparent; color: var(--cyan); font-family: var(--font-mono); cursor: pointer; text-transform: uppercase; letter-spacing: var(--tracking-wide); transition: all var(--duration-normal) var(--ease-default); }
        .btn-sm:hover { background: var(--cyan); color: var(--bg-void); }
        .btn-sm:disabled { opacity: 0.3; cursor: not-allowed; }

        .empty { text-align: center; padding: var(--space-10); color: var(--text-muted); font-family: var(--font-mono); font-size: var(--text-sm); }
        .error-msg { color: var(--offline); font-size: var(--text-sm); font-family: var(--font-mono); padding: var(--space-4); text-align: center; }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .stats-row { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
<div class="shell">
    <div class="header">
        <h1><span>Quotes</span> — Bridge AI OS</h1>
    </div>

    <div class="stats-row">
        <div class="stat-card"><div class="stat-label">Total Quotes</div><div class="stat-value" id="s-total">--</div></div>
        <div class="stat-card"><div class="stat-label">Accepted Rate</div><div class="stat-value" id="s-rate">--</div></div>
        <div class="stat-card"><div class="stat-label">Total Value</div><div class="stat-value" id="s-value">--</div></div>
    </div>

    <div class="form-card">
        <div class="section-title">Create Quote</div>
        <form id="createForm">
            <div class="form-grid">
                <div><label>Client</label><input id="f-client" required placeholder="Client name"></div>
                <div><label>Items (comma-separated)</label><input id="f-items" required placeholder="Item 1, Item 2"></div>
            </div>
            <div class="form-grid full">
                <div><label>Notes</label><textarea id="f-notes" placeholder="Optional notes"></textarea></div>
            </div>
            <div style="margin-top:var(--space-4)"><button type="submit" class="btn-primary">Create Quote</button></div>
        </form>
    </div>

    <div class="section-title">All Quotes</div>
    <div class="table-wrap">
        <table>
            <thead><tr><th>ID</th><th>Client</th><th>Amount</th><th>Status</th><th>Action</th></tr></thead>
            <tbody id="quote-body"><tr><td colspan="5" class="empty">Loading...</td></tr></tbody>
        </table>
    </div>
</div>

<script>
(function() {
    var body = document.getElementById('quote-body');
    var form = document.getElementById('createForm');

    function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function fmt(n) { return '$' + Number(n || 0).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}); }

    function renderRow(q) {
        var tr = document.createElement('tr');
        var id = q.id || q._id || '--';
        var status = (q.status || 'draft').toLowerCase();
        var canAccept = status !== 'accepted' && status !== 'rejected';

        var tdId = document.createElement('td');
        tdId.style.fontFamily = 'var(--font-mono)';
        tdId.textContent = id;

        var tdClient = document.createElement('td');
        tdClient.textContent = q.client || '--';

        var tdAmt = document.createElement('td');
        tdAmt.style.fontFamily = 'var(--font-mono)';
        tdAmt.textContent = fmt(q.amount || q.total);

        var tdStatus = document.createElement('td');
        var badge = document.createElement('span');
        badge.className = 'badge badge-' + status;
        badge.textContent = status;
        tdStatus.appendChild(badge);

        var tdAction = document.createElement('td');
        if (canAccept) {
            var btn = document.createElement('button');
            btn.className = 'btn-sm';
            btn.textContent = 'Accept';
            btn.addEventListener('click', function() { acceptQuote(id); });
            tdAction.appendChild(btn);
        } else {
            tdAction.textContent = '\u2014';
        }

        tr.appendChild(tdId);
        tr.appendChild(tdClient);
        tr.appendChild(tdAmt);
        tr.appendChild(tdStatus);
        tr.appendChild(tdAction);
        return tr;
    }

    function load() {
        fetch('/api/quotes').then(function(r) { return r.json(); }).then(function(data) {
            var list = Array.isArray(data) ? data : (data.quotes || data.data || []);
            updateStats(list);
            body.replaceChildren();
            if (!list.length) {
                var tr = document.createElement('tr');
                var td = document.createElement('td');
                td.colSpan = 5; td.className = 'empty'; td.textContent = 'No quotes yet';
                tr.appendChild(td); body.appendChild(tr);
                return;
            }
            list.forEach(function(q) { body.appendChild(renderRow(q)); });
        }).catch(function() {
            body.replaceChildren();
            var tr = document.createElement('tr');
            var td = document.createElement('td');
            td.colSpan = 5; td.className = 'error-msg'; td.textContent = 'Failed to load quotes';
            tr.appendChild(td); body.appendChild(tr);
        });
    }

    function updateStats(list) {
        document.getElementById('s-total').textContent = list.length;
        var accepted = list.filter(function(q) { return q.status && q.status.toLowerCase() === 'accepted'; }).length;
        document.getElementById('s-rate').textContent = list.length ? Math.round((accepted / list.length) * 100) + '%' : '0%';
        var total = list.reduce(function(s, q) { return s + Number(q.amount || q.total || 0); }, 0);
        document.getElementById('s-value').textContent = fmt(total);
    }

    function acceptQuote(id) {
        fetch('/api/quotes/' + encodeURIComponent(id) + '/accept', { method: 'POST' })
            .then(function(r) { return r.json(); })
            .then(function() { load(); })
            .catch(function() { alert('Failed to accept quote'); });
    }

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        var payload = {
            client: document.getElementById('f-client').value,
            items: document.getElementById('f-items').value.split(',').map(function(s) { return s.trim(); }),
            notes: document.getElementById('f-notes').value
        };
        fetch('/api/quotes', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(function(r) { return r.json(); }).then(function() {
            form.reset();
            load();
        }).catch(function() { alert('Failed to create quote'); });
    });

    load();
})();
</script>
<script src="/bridge-nav.js"></script>
</body>
</html>
