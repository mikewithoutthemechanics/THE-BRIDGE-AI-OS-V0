<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Bridge AI Avatar — Unified Face Engine | Bridge AI OS</title>
<meta name="description" content="Bridge AI OS unified anatomical face engine — procedural, FACS, constrained elastic, tension balanced, vector muscle, and embodied modes.">
<meta property="og:title" content="Bridge AI Avatar — Unified Face Engine">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="canonical" href="https://aoe-unified-final.vercel.app/avatar">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #060810; --panel: #0d1117; --border: #1a2a3a;
    --cyan: #00ffc8; --text: #e0e0e0; --muted: #556;
  }
  html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; overflow: hidden; }
  #ui {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    padding: 10px 16px; background: rgba(6,8,16,0.88);
    backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); z-index: 10;
  }
  #ui h1 { font-size: 13px; font-weight: 700; color: var(--cyan); letter-spacing: 2px; margin-right: 8px; white-space: nowrap; }
  .mode-btn {
    padding: 5px 13px; border-radius: 20px; font-size: 11px; font-weight: 600;
    border: 1px solid var(--border); background: transparent; color: var(--muted);
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .mode-btn:hover { border-color: var(--cyan); color: var(--cyan); }
  .mode-btn.active { background: var(--cyan); color: #000; border-color: var(--cyan); }
  #mode-label {
    position: fixed; top: 54px; right: 16px; z-index: 10;
    font-size: 11px; color: var(--muted); font-family: monospace;
    background: rgba(6,8,16,0.75); padding: 4px 10px;
    border: 1px solid var(--border); border-radius: 4px;
  }
  #controls {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
    padding: 10px 16px; background: rgba(6,8,16,0.88);
    backdrop-filter: blur(10px); border-top: 1px solid var(--border); z-index: 10;
  }
  .sg { display: flex; flex-direction: column; gap: 3px; min-width: 110px; }
  .sg label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .sg input[type=range] { width: 100%; accent-color: var(--cyan); }
  .stat { font-size: 10px; color: var(--muted); font-family: monospace; }
  .stat span { color: var(--cyan); }
  canvas { width: 100%; height: 100%; display: block; }
</style>
</head>
<body>
<script src="/bridge-nav.js?v=2"></script>

<div id="ui">
  <h1>⬡ BRIDGE AI AVATAR</h1>
  <button class="mode-btn active" data-mode="procedural">Procedural</button>
  <button class="mode-btn" data-mode="facs">FACS Morph</button>
  <button class="mode-btn" data-mode="constrained">Constrained</button>
  <button class="mode-btn" data-mode="tension">Tension</button>
  <button class="mode-btn" data-mode="vector">Vector Muscle</button>
  <button class="mode-btn" data-mode="embodied">Embodied</button>
</div>

<div id="mode-label">MODE: PROCEDURAL</div>
<canvas id="renderCanvas"></canvas>

<div id="controls">
  <div class="sg"><label>Smile</label><input type="range" id="slSmile" min="0" max="100" value="50"></div>
  <div class="sg"><label>Brow</label><input type="range" id="slBrow" min="0" max="100" value="50"></div>
  <div class="sg"><label>Jaw</label><input type="range" id="slJaw" min="0" max="100" value="0"></div>
  <div class="sg"><label>Tension</label><input type="range" id="slTension" min="0" max="100" value="30"></div>
  <div class="sg"><label>Speed</label><input type="range" id="slSpeed" min="0" max="100" value="60"></div>
  <div class="stat">FPS <span id="sFps">60</span></div>
  <div class="stat">Verts <span id="sVerts">--</span></div>
  <div class="stat">Mode <span id="sMode">procedural</span></div>
</div>

<script>
// ============================================================
// BRIDGE AI UNIFIED FACE ENGINE v1.0
// Modes: procedural · facs · constrained · tension · vector · embodied
// ============================================================

const canvas = document.getElementById('renderCanvas');
const engine = new BABYLON.Engine(canvas, true);

const slSmile   = document.getElementById('slSmile');
const slBrow    = document.getElementById('slBrow');
const slJaw     = document.getElementById('slJaw');
const slTension = document.getElementById('slTension');
const slSpeed   = document.getElementById('slSpeed');

let animSpeed = 0.6;
slSpeed.addEventListener('input', () => { animSpeed = slSpeed.value / 100 * 2; });

// ── Scene builder ─────────────────────────────────────────────
function buildScene(mode) {
  const scene = new BABYLON.Scene(engine);
  scene.clearColor = new BABYLON.Color4(0.03, 0.04, 0.06, 1);

  // Camera
  const cam = new BABYLON.ArcRotateCamera('cam', Math.PI / 2, Math.PI / 2.5, 5, BABYLON.Vector3.Zero(), scene);
  cam.attachControl(canvas, true);
  cam.lowerRadiusLimit = 2; cam.upperRadiusLimit = 14;

  // Lighting
  const hemi = new BABYLON.HemisphericLight('h', new BABYLON.Vector3(0, 1, 0), scene);
  hemi.intensity = mode === 'vector' ? 0.1 : 0.7;
  const key = new BABYLON.DirectionalLight('key', new BABYLON.Vector3(-1, -1.5, -2), scene);
  key.intensity = 0.5;
  const rim = new BABYLON.PointLight('rim', new BABYLON.Vector3(0, 2, -3), scene);
  rim.diffuse = new BABYLON.Color3(0, 0.8, 1); rim.intensity = 0.3;

  // ── Base skin material ──────────────────────────────────────
  function makeSkin(name, r) {
    const m = new BABYLON.PBRMaterial(name, scene);
    m.albedoColor = new BABYLON.Color3(1.0, 0.78, 0.65);
    m.roughness = r || 0.6; m.metallic = 0; return m;
  }

  // ── Head mesh ───────────────────────────────────────────────
  const segs = (mode === 'facs' || mode === 'constrained') ? 128 : 64;
  const head = BABYLON.MeshBuilder.CreateSphere('head', {
    diameterX: 1.6, diameterY: 2.0, diameterZ: 1.6, segments: segs
  }, scene);

  if (mode === 'vector') {
    const wm = new BABYLON.StandardMaterial('wire', scene);
    wm.wireframe = true; wm.emissiveColor = new BABYLON.Color3(0, 1, 0.8);
    head.material = wm;
  } else if (mode === 'embodied') {
    const sm = makeSkin('eskin', 0.75);
    sm.albedoColor = new BABYLON.Color3(0.88, 0.68, 0.58);
    head.material = sm;
  } else {
    head.material = makeSkin('skin_' + mode, mode === 'tension' ? 0.7 : 0.55);
  }

  // ── FACS Morph targets ──────────────────────────────────────
  let smileTarget, blinkTarget, browTarget;
  if (mode === 'facs' || mode === 'constrained' || mode === 'tension') {
    const mm = new BABYLON.MorphTargetManager();
    head.morphTargetManager = mm;
    const base = head.getVerticesData(BABYLON.VertexBuffer.PositionKind);

    smileTarget = new BABYLON.MorphTarget('smile', 0);
    const sp = base.slice();
    for (let i = 0; i < sp.length; i += 3) {
      if (sp[i+1] < 0 && sp[i+2] > 0.4) sp[i+1] += 0.18 * Math.abs(sp[i]);
    }
    smileTarget.setPositions(sp); mm.addTarget(smileTarget);

    blinkTarget = new BABYLON.MorphTarget('blink', 0);
    const bp = base.slice();
    for (let i = 0; i < bp.length; i += 3) {
      if (bp[i+1] > 0.2 && bp[i+2] > 0.5) bp[i+1] -= 0.15;
    }
    blinkTarget.setPositions(bp); mm.addTarget(blinkTarget);

    browTarget = new BABYLON.MorphTarget('brow', 0);
    const brp = base.slice();
    for (let i = 0; i < brp.length; i += 3) {
      if (brp[i+1] > 0.5 && Math.abs(brp[i]) > 0.3) brp[i+1] += 0.12;
    }
    browTarget.setPositions(brp); mm.addTarget(browTarget);
  }

  // ── Eyes ─────────────────────────────────────────────────
  function makeEye(xOff) {
    const scl = BABYLON.MeshBuilder.CreateSphere('scl', { diameter: 0.35, segments: 32 }, scene);
    const pup = BABYLON.MeshBuilder.CreateSphere('pup', { diameter: 0.14, segments: 16 }, scene);
    scl.position = new BABYLON.Vector3(xOff, 0.28, 0.74);
    pup.position = new BABYLON.Vector3(xOff, 0.28, 0.91);

    const sm = new BABYLON.PBRMaterial('scM', scene);
    sm.albedoColor = new BABYLON.Color3(0.98, 0.98, 0.98); sm.roughness = 0.05; sm.metallic = 0;
    scl.material = sm;

    const im = new BABYLON.PBRMaterial('irM', scene);
    im.albedoColor = mode === 'vector'
      ? new BABYLON.Color3(0, 1, 0.8)
      : new BABYLON.Color3(0.1, 0.4, 0.8);
    im.roughness = 0.1; im.metallic = 0;
    pup.material = im;

    return { scl, pup };
  }
  const eyeL = makeEye(-0.35); const eyeR = makeEye(0.35);

  // ── Nose ─────────────────────────────────────────────────
  const skinRef = head.material instanceof BABYLON.PBRMaterial ? head.material : makeSkin('nsk', 0.6);
  const nose = BABYLON.MeshBuilder.CreateCylinder('nose', {
    height: 0.55, diameterTop: 0.06, diameterBottom: 0.28, tessellation: 32
  }, scene);
  nose.rotation.x = Math.PI / 2;
  nose.position = new BABYLON.Vector3(0, -0.05, 0.91);
  nose.material = head.material;

  // ── Cheeks ────────────────────────────────────────────────
  function makeCheek(xOff) {
    const c = BABYLON.MeshBuilder.CreateSphere('cheek', { diameter: 0.54, segments: 24 }, scene);
    c.scaling.y = 0.65; c.position = new BABYLON.Vector3(xOff, -0.15, 0.62);
    c.material = head.material; return c;
  }
  const cheekL = makeCheek(-0.62); const cheekR = makeCheek(0.62);

  // ── Jaw ───────────────────────────────────────────────────
  const jaw = BABYLON.MeshBuilder.CreateBox('jaw', { width: 1.4, height: 0.38, depth: 1.1 }, scene);
  jaw.position = new BABYLON.Vector3(0, -0.88, 0);
  jaw.material = head.material;

  // ── Tension / vector lines ────────────────────────────────
  const tensionLines = [];
  if (mode === 'tension' || mode === 'vector' || mode === 'constrained') {
    const pts = [
      [new BABYLON.Vector3(-0.62, -0.15, 0.62), new BABYLON.Vector3(-0.35, 0.28, 0.74)],
      [new BABYLON.Vector3(0.62,  -0.15, 0.62),  new BABYLON.Vector3(0.35,  0.28, 0.74)],
      [new BABYLON.Vector3(0,     -0.88, 0),      new BABYLON.Vector3(0,    -0.05, 0.91)],
      [new BABYLON.Vector3(-0.5,   0.1,  0.5),   new BABYLON.Vector3(0,    -0.05, 0.91)],
      [new BABYLON.Vector3(0.5,    0.1,  0.5),   new BABYLON.Vector3(0,    -0.05, 0.91)],
    ];
    const lineColor = mode === 'constrained'
      ? new BABYLON.Color3(1, 0.6, 0)
      : new BABYLON.Color3(0, 1, 0.8);
    pts.forEach(([a, b], i) => {
      const ln = BABYLON.MeshBuilder.CreateLines('tl' + i, { points: [a, b] }, scene);
      ln.color = lineColor; tensionLines.push(ln);
    });
  }

  // ── Embodied stress particles ─────────────────────────────
  let sparks;
  if (mode === 'embodied') {
    sparks = new BABYLON.ParticleSystem('sparks', 300, scene);
    sparks.particleTexture = new BABYLON.Texture('https://www.babylonjs.com/assets/Flare.png', scene);
    sparks.emitter = head;
    sparks.minEmitBox = new BABYLON.Vector3(-0.8, -1, -0.8);
    sparks.maxEmitBox = new BABYLON.Vector3(0.8,  1,  0.8);
    sparks.color1 = new BABYLON.Color4(1, 0.4, 0, 0.6);
    sparks.color2 = new BABYLON.Color4(1, 0,   0.4, 0.3);
    sparks.minSize = 0.02; sparks.maxSize = 0.07;
    sparks.minLifeTime = 0.4; sparks.maxLifeTime = 1.4;
    sparks.emitRate = 20;
    sparks.direction1 = new BABYLON.Vector3(-0.5, 0.5, -0.5);
    sparks.direction2 = new BABYLON.Vector3(0.5,  1.2,  0.5);
    sparks.gravity = new BABYLON.Vector3(0, -0.3, 0);
    sparks.start();
  }

  // ── Animate ───────────────────────────────────────────────
  scene.registerBeforeRender(() => {
    const t = performance.now() * 0.001 * (animSpeed || 0.6);
    const smile   = slSmile.value   / 100;
    const browV   = slBrow.value    / 100;
    const jawV    = slJaw.value     / 100;
    const tensV   = slTension.value / 100;

    // Eyes
    const ey = Math.sin(t) * 0.4;
    eyeL.scl.rotation.y = ey; eyeR.scl.rotation.y = ey;
    eyeL.pup.rotation.y = ey; eyeR.pup.rotation.y = ey;

    // Blink
    const blink = Math.max(0, Math.sin(t * 4.5));
    eyeL.scl.scaling.y = 1 - blink * 0.65; eyeR.scl.scaling.y = 1 - blink * 0.65;

    // Cheek / smile
    const smA = (Math.sin(t * 0.9) + 1) / 2;
    const smB = smile * 0.35 + smA * 0.65;
    cheekL.scaling.y = 0.65 + smB * 0.22; cheekR.scaling.y = 0.65 + smB * 0.22;

    // Jaw
    jaw.rotation.x = jawV * 0.45 + Math.abs(Math.sin(t * 1.1)) * 0.07;

    // Nose breathe
    nose.scaling.x = 1 + Math.sin(t * 0.5) * 0.04;

    // Head sway
    head.rotation.y = Math.sin(t * 0.3) * 0.1;
    head.rotation.z = Math.cos(t * 0.4) * 0.03;
    jaw.rotation.y = head.rotation.y;

    // Morph targets
    if (smileTarget) smileTarget.influence = smB;
    if (blinkTarget) blinkTarget.influence = blink;
    if (browTarget)  browTarget.influence  = browV;

    // Tension lines alpha
    tensionLines.forEach((ln, i) => {
      ln.alpha = 0.3 + tensV * 0.7 * Math.abs(Math.sin(t * 1.5 + i));
    });

    // Embodied particles
    if (sparks) sparks.emitRate = 10 + tensV * 90;

    // Breathing scale
    head.scaling.y = 1 + Math.sin(t * 0.4) * 0.008;

    // Stats
    document.getElementById('sFps').textContent = Math.round(engine.getFps());
  });

  // Count verts after build
  setTimeout(() => {
    let v = 0;
    scene.meshes.forEach(m => { try { v += m.getTotalVertices(); } catch(_) {} });
    document.getElementById('sVerts').textContent = v.toLocaleString();
  }, 600);

  return scene;
}

// ── Init ──────────────────────────────────────────────────────
let active = buildScene('procedural');
engine.runRenderLoop(() => active && active.render());
window.addEventListener('resize', () => engine.resize());

function switchMode(mode) {
  document.getElementById('mode-label').textContent = 'MODE: ' + mode.toUpperCase();
  document.getElementById('sMode').textContent = mode;
  document.getElementById('sVerts').textContent = '--';
  if (active) { active.dispose(); active = null; }
  active = buildScene(mode);
}

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    switchMode(btn.dataset.mode);
  });
});
</script>
</body>
</html>
