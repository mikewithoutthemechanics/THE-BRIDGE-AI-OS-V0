<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Constrained Elastic Face</title>
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<style>
html,body{width:100%;height:100%;margin:0;overflow:hidden;}
canvas{width:100%;height:100%;}
</style>
<link rel="stylesheet" href="/bridge-tokens.css"></head>
<body>
<canvas id="renderCanvas"></canvas>
<script>

const canvas = document.getElementById("renderCanvas");
const engine = new BABYLON.Engine(canvas,true);

const createScene = () => {

const scene = new BABYLON.Scene(engine);
scene.clearColor = new BABYLON.Color4(0.02,0.02,0.05,1);

const camera = new BABYLON.ArcRotateCamera("cam",
Math.PI/2,Math.PI/2.3,5,
BABYLON.Vector3.Zero(),scene);
camera.attachControl(canvas,true);

new BABYLON.HemisphericLight("light",
new BABYLON.Vector3(0,1,0),scene).intensity = 1;

// =====================
// HEAD
// =====================

const head = BABYLON.MeshBuilder.CreateSphere("head",{
diameterX:1.6,
diameterY:2,
diameterZ:1.6,
segments:128
},scene);

const mat = new BABYLON.PBRMaterial("skin",scene);
mat.albedoColor = new BABYLON.Color3(1,0.78,0.65);
mat.roughness = 0.5;
head.material = mat;

const base = head.getVerticesData(BABYLON.VertexBuffer.PositionKind);
let current = base.slice();
let velocity = new Float32Array(base.length).fill(0);

// =====================
// CONSTRAINT MASK (bone lock)
// =====================

function isBoneLocked(vx,vy,vz){
if(vz < -0.2) return true;       // back skull
if(vy > 0.8) return true;        // top cranium
return false;
}

// =====================
// MUSCLE FIELD
// =====================

function accumulateForce(anchor,dir,radius,strength,forceArray){

for(let i=0;i<base.length;i+=3){

let vx = base[i];
let vy = base[i+1];
let vz = base[i+2];

if(isBoneLocked(vx,vy,vz)) continue;

let dx = vx-anchor.x;
let dy = vy-anchor.y;
let dz = vz-anchor.z;

let dist = Math.sqrt(dx*dx+dy*dy+dz*dz);
if(dist<radius){

let falloff = Math.exp(-(dist*dist)/(radius*radius));

forceArray[i]   += dir.x * strength * falloff;
forceArray[i+1] += dir.y * strength * falloff;
forceArray[i+2] += dir.z * strength * falloff;

}

}

}

// =====================
// LOOP
// =====================

scene.registerBeforeRender(()=>{

let t = performance.now()*0.002;

let smile = (Math.sin(t)+1)/2;
let blink = Math.max(0,Math.sin(t*3));

// Force accumulator
let force = new Float32Array(base.length).fill(0);

// Zygomaticus
accumulateForce(
new BABYLON.Vector3(-0.4,-0.2,0.6),
new BABYLON.Vector3(-0.2,0.3,0),
0.6,0.3*smile,force
);

accumulateForce(
new BABYLON.Vector3(0.4,-0.2,0.6),
new BABYLON.Vector3(0.2,0.3,0),
0.6,0.3*smile,force
);

// Orbicularis
accumulateForce(
new BABYLON.Vector3(-0.35,0.3,0.7),
new BABYLON.Vector3(0,-0.2,0),
0.4,0.25*blink,force
);

accumulateForce(
new BABYLON.Vector3(0.35,0.3,0.7),
new BABYLON.Vector3(0,-0.2,0),
0.4,0.25*blink,force
);

// Apply normalized blending + damping
for(let i=0;i<base.length;i+=3){

let vx = base[i];
let vy = base[i+1];
let vz = base[i+2];

if(isBoneLocked(vx,vy,vz)){
current[i] = base[i];
current[i+1] = base[i+1];
current[i+2] = base[i+2];
continue;
}

// Tangential redistribution (preserve volume)
let normal = new BABYLON.Vector3(vx,vy,vz).normalize();
let tangentialForce = new BABYLON.Vector3(
force[i],force[i+1],force[i+2]
).subtract(normal.scale(
BABYLON.Vector3.Dot(
new BABYLON.Vector3(force[i],force[i+1],force[i+2]),
normal
)
));

// Viscoelastic damping
velocity[i]   = velocity[i]*0.85 + tangentialForce.x*0.1;
velocity[i+1] = velocity[i+1]*0.85 + tangentialForce.y*0.1;
velocity[i+2] = velocity[i+2]*0.85 + tangentialForce.z*0.1;

current[i]   = base[i] + velocity[i];
current[i+1] = base[i+1] + velocity[i+1];
current[i+2] = base[i+2] + velocity[i+2];

}

head.updateVerticesData(
BABYLON.VertexBuffer.PositionKind,
current
);

});

return scene;
};

const scene = createScene();
engine.runRenderLoop(()=>scene.render());
window.addEventListener("resize",()=>engine.resize());

</script>
<script src="/bridge-nav.js"></script></body>
</html>
