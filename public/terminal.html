<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="description" content="Bridge AI OS — Secure Ops Terminal" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BRIDGE AI OS — Secure Ops</title>

  <!-- CSP: no eval, no inline scripts, whitelisted CDN only -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://cdn.jsdelivr.net;
    style-src  'self' https://cdn.jsdelivr.net 'unsafe-inline';
    connect-src 'self' wss:;
    object-src 'none';
    base-uri 'self';
  ">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #050a0f;
      --surface:  #0d1620;
      --border:   #1a2d40;
      --accent:   #00c8ff;
      --green:    #00e57b;
      --red:      #ff3c5a;
      --yellow:   #ffd166;
      --text:     #c8dce8;
      --text-dim: #628ba0;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; }
    .app { display: flex; flex-direction: column; height: 100vh; }

    .toolbar {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .toolbar a {
      color: var(--text-dim); text-decoration: none; font-size: 0.75rem;
      letter-spacing: 0.1em; padding: 0.3rem 0.6rem;
      border: 1px solid var(--border); border-radius: 4px;
    }
    .toolbar a:hover { color: var(--accent); border-color: var(--accent); }
    .toolbar .title  { font-size: 0.8rem; color: var(--accent); letter-spacing: 0.15em; flex: 1; }
    .toolbar .status { font-size: 0.7rem; color: var(--text-dim); }

    .controls {
      display: flex; gap: 0.5rem; padding: 0.5rem 1rem;
      background: #080e16; border-bottom: 1px solid var(--border); flex-wrap: wrap;
    }
    .controls input {
      flex: 1; min-width: 200px; padding: 0.4rem 0.6rem;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-family: inherit; font-size: 0.75rem; border-radius: 4px;
    }
    .controls input:focus { outline: none; border-color: var(--accent); }
    .btn {
      padding: 0.4rem 0.9rem; font-size: 0.72rem; font-family: inherit;
      letter-spacing: 0.1em; cursor: pointer; border-radius: 4px;
      border: 1px solid var(--border); background: var(--surface); color: var(--text);
      transition: border-color 0.15s, color 0.15s;
    }
    .btn:hover  { border-color: var(--accent); color: var(--accent); }
    .btn.green  { color: var(--green); border-color: var(--green); }
    .btn.green:hover { background: rgba(0,229,123,0.08); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .cmd-bar {
      display: none; gap: 0.5rem; padding: 0.4rem 1rem;
      background: #080e16; border-bottom: 1px solid var(--border); flex-wrap: wrap;
    }
    .cmd-bar.visible { display: flex; }
    .cmd-btn {
      padding: 0.35rem 0.8rem; font-size: 0.7rem; font-family: inherit;
      cursor: pointer; border-radius: 4px; letter-spacing: 0.08em;
      border: 1px solid var(--border); background: var(--surface); color: var(--text-dim);
    }
    .cmd-btn:hover { border-color: var(--green); color: var(--green); }

    .terminal-container { flex: 1; position: relative; }
    #term-wrapper { position: absolute; inset: 0; padding: 4px; }

    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0;
               margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
  </style>
</head>
<body>
<h1 class="sr-only">BRIDGE AI OS — Secure Ops Terminal</h1>
<div class="app">

  <div class="toolbar">
    <a href="/">&#8592; DASHBOARD</a>
    <div class="title">SECURE OPS TERMINAL</div>
    <div class="status" id="conn-status">DISCONNECTED</div>
  </div>

  <div class="controls">
    <input id="token-input" type="password" placeholder="JWT token" autocomplete="off" />
    <button class="btn green" id="btn-connect">CONNECT</button>
    <button class="btn" id="btn-disconnect" disabled>DISCONNECT</button>
    <button class="btn" id="btn-clear">CLEAR</button>
  </div>

  <!-- command buttons injected via safe DOM after auth -->
  <div class="cmd-bar" id="cmd-bar" role="toolbar" aria-label="Available commands"></div>

  <div class="terminal-container">
    <div id="term-wrapper"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<script src="/bridge-nav.js" defer></script>
<script>
  const WS_PROTO = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const WS_URL   = `${WS_PROTO}//${location.host}/terminal`;

  const term = new Terminal({
    cursorBlink: true, fontSize: 14, fontFamily: "'Courier New', monospace",
    theme: {
      background: '#050a0f', foreground: '#c8dce8', cursor: '#00c8ff',
      selectionBackground: '#1a2d40',
      black: '#050a0f', green: '#00e57b', cyan: '#00c8ff',
      red: '#ff3c5a', yellow: '#ffd166',
    }
  });
  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(document.getElementById('term-wrapper'));
  fitAddon.fit();
  window.addEventListener('resize', () => fitAddon.fit());

  term.writeln('\x1b[36mBRIDGE AI OS \u2014 Secure Ops Terminal\x1b[0m');
  term.writeln('\x1b[2mEnter your JWT token above and click CONNECT.\x1b[0m\r\n');

  let ws = null;

  const elStatus     = document.getElementById('conn-status');
  const elConnect    = document.getElementById('btn-connect');
  const elDisconnect = document.getElementById('btn-disconnect');
  const elClear      = document.getElementById('btn-clear');
  const elCmdBar     = document.getElementById('cmd-bar');
  const elToken      = document.getElementById('token-input');

  function setStatus(label, color) {
    elStatus.textContent = label;
    elStatus.style.color = color;
  }

  function buildCommandBar(commands) {
    // Safe DOM construction — no innerHTML with dynamic data
    elCmdBar.replaceChildren();
    commands.forEach(function(item) {
      const btn = document.createElement('button');
      btn.className = 'cmd-btn';
      btn.textContent = item.label;      // textContent, never innerHTML
      btn.dataset.cmdKey = item.key;     // safe attribute, not interpolated into HTML
      btn.addEventListener('click', function() { runCmd(item.key); });
      elCmdBar.appendChild(btn);
    });
    elCmdBar.classList.add('visible');
  }

  function runCmd(key) {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      term.writeln('\x1b[31m[!] Not connected\x1b[0m');
      return;
    }
    ws.send(JSON.stringify({ type: 'exec', command: key }));
  }

  function connect() {
    const token = elToken.value.trim();
    if (!token) { term.writeln('\x1b[31m[!] Token required\x1b[0m'); return; }

    if (ws) { try { ws.close(); } catch (_) {} }

    setStatus('CONNECTING\u2026', 'var(--yellow)');
    ws = new WebSocket(WS_URL);

    ws.onopen = function() {
      ws.send(JSON.stringify({ type: 'auth', token: token }));
    };

    ws.onmessage = function(e) {
      var msg;
      try { msg = JSON.parse(e.data); } catch (_) { return; }

      if (msg.type === 'init') {
        setStatus('CONNECTED', 'var(--green)');
        elConnect.disabled    = true;
        elDisconnect.disabled = false;
        term.writeln('\x1b[32m\u2714 Authenticated\x1b[0m\r\n');
        buildCommandBar(msg.commands || []);
        return;
      }
      if (msg.type === 'output') {
        term.write(msg.data.replace(/\n/g, '\r\n'));
        return;
      }
      if (msg.type === 'done') {
        term.writeln('\r\n\x1b[2m[exit ' + msg.code + ']\x1b[0m\r\n');
        return;
      }
      if (msg.type === 'error') {
        term.writeln('\r\n\x1b[31m[ERR] ' + msg.message + '\x1b[0m\r\n');
        return;
      }
    };

    ws.onclose = function() {
      setStatus('DISCONNECTED', 'var(--red)');
      elConnect.disabled    = false;
      elDisconnect.disabled = true;
      elCmdBar.classList.remove('visible');
      term.writeln('\r\n\x1b[33m[Disconnected]\x1b[0m\r\n');
    };

    ws.onerror = function() {
      term.writeln('\x1b[31m[!] Connection error\x1b[0m');
    };
  }

  function disconnect() {
    if (ws) { try { ws.close(); } catch (_) {} ws = null; }
  }

  elConnect.addEventListener('click', connect);
  elDisconnect.addEventListener('click', disconnect);
  elClear.addEventListener('click', function() { term.clear(); });
  elToken.addEventListener('keydown', function(e) { if (e.key === 'Enter') connect(); });
</script>
</body>
</html>
