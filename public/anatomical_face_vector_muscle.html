<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Vector Muscle Face</title>
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<style>
html,body{width:100%;height:100%;margin:0;overflow:hidden;}
canvas{width:100%;height:100%;}
</style>
</head>
<body>
<canvas id="renderCanvas"></canvas>
<script>

const canvas = document.getElementById("renderCanvas");
const engine = new BABYLON.Engine(canvas, true);

const createScene = () => {

const scene = new BABYLON.Scene(engine);
scene.clearColor = new BABYLON.Color4(0.02,0.02,0.04,1);

const camera = new BABYLON.ArcRotateCamera("cam",
Math.PI/2, Math.PI/2.3, 5,
BABYLON.Vector3.Zero(), scene);
camera.attachControl(canvas,true);

new BABYLON.HemisphericLight("light",
new BABYLON.Vector3(0,1,0), scene).intensity = 1;

// =======================
// HEAD BASE
// =======================

const head = BABYLON.MeshBuilder.CreateSphere("head",{
diameterX:1.6,
diameterY:2,
diameterZ:1.6,
segments:128
},scene);

const skin = new BABYLON.PBRMaterial("skin",scene);
skin.albedoColor = new BABYLON.Color3(1,0.78,0.65);
skin.roughness = 0.5;
head.material = skin;

const basePositions = head.getVerticesData(BABYLON.VertexBuffer.PositionKind);
let workingPositions = basePositions.slice();

// =======================
// MUSCLE FIELD FUNCTION
// =======================

function applyMuscle(anchor, direction, radius, strength){

for(let i=0;i<workingPositions.length;i+=3){

let vx = basePositions[i];
let vy = basePositions[i+1];
let vz = basePositions[i+2];

let dx = vx - anchor.x;
let dy = vy - anchor.y;
let dz = vz - anchor.z;

let dist = Math.sqrt(dx*dx + dy*dy + dz*dz);

if(dist < radius){

let falloff = Math.exp(-(dist*dist)/(radius*radius));
workingPositions[i] += direction.x * strength * falloff;
workingPositions[i+1] += direction.y * strength * falloff;
workingPositions[i+2] += direction.z * strength * falloff;

}

}

}

// =======================
// EYES
// =======================

function createEye(x,color){

const eye = BABYLON.MeshBuilder.CreateSphere("eye",{diameter:0.35},scene);
eye.position = new BABYLON.Vector3(x,0.3,0.75);

const m = new BABYLON.PBRMaterial("eyeMat",scene);
m.albedoColor = color;
m.roughness = 0.1;
eye.material = m;

return eye;
}

const leftEye = createEye(-0.35,new BABYLON.Color3(0.2,0.5,0.9));
const rightEye = createEye(0.35,new BABYLON.Color3(0.2,0.5,0.9));

// =======================
// JAW
// =======================

const jaw = BABYLON.MeshBuilder.CreateBox("jaw",{
width:1.4,height:0.4,depth:1.2
},scene);

jaw.position = new BABYLON.Vector3(0,-0.9,0);
jaw.material = skin;

// =======================
// ANIMATION
// =======================

scene.registerBeforeRender(()=>{

let t = performance.now()*0.002;

// Reset mesh
workingPositions = basePositions.slice();

// Zygomaticus Major (Smile Pull)
applyMuscle(
new BABYLON.Vector3(-0.4,-0.2,0.6),
new BABYLON.Vector3(-0.2,0.3,0),
0.6,
0.2 * (Math.sin(t)+1)/2
);

applyMuscle(
new BABYLON.Vector3(0.4,-0.2,0.6),
new BABYLON.Vector3(0.2,0.3,0),
0.6,
0.2 * (Math.sin(t)+1)/2
);

// Orbicularis Oculi (Blink)
let blink = Math.max(0,Math.sin(t*3));
applyMuscle(
new BABYLON.Vector3(-0.35,0.3,0.7),
new BABYLON.Vector3(0,-0.2,0),
0.4,
blink * 0.2
);

applyMuscle(
new BABYLON.Vector3(0.35,0.3,0.7),
new BABYLON.Vector3(0,-0.2,0),
0.4,
blink * 0.2
);

// Apply updated vertices
head.updateVerticesData(
BABYLON.VertexBuffer.PositionKind,
workingPositions
);

// Eye tracking
leftEye.rotation.y = Math.sin(t)*0.4;
rightEye.rotation.y = Math.sin(t)*0.4;

// Jaw hinge
jaw.rotation.x = Math.abs(Math.sin(t))*0.3;

});

return scene;
};

const scene = createScene();
engine.runRenderLoop(()=>scene.render());
window.addEventListener("resize",()=>engine.resize());

</script>
</body>
</html>
