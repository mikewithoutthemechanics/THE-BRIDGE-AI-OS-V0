<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bridge AI OS — Offline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:#050a0f;color:#e0e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem}
.container{max-width:420px}
.icon{font-size:4rem;margin-bottom:1.5rem;opacity:.6}
h1{font-size:1.8rem;font-weight:800;margin-bottom:.5rem;color:#00c8ff}
p{color:#4d6678;margin-bottom:2rem;line-height:1.6}
.btn{display:inline-block;padding:.75rem 2rem;border-radius:8px;background:#00c8ff;color:#000;font-weight:700;text-decoration:none;border:none;cursor:pointer;font-size:1rem;transition:opacity .2s}
.btn:hover{opacity:.85}
</style>
</head>
<body>
<div class="container">
  <div class="icon">&#x1F4E1;</div>
  <h1>You're Offline</h1>
  <p>Bridge AI OS requires a network connection for full functionality. Check your connection and try again.</p>
  <button class="btn" onclick="window.location.reload()">Retry</button>
</div>
</body>
</html>
