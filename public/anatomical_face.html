<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Procedural Anatomical Face</title>
    <meta name="description" content="Anatomical Face — SVG Face Rendering Engine">
    <meta property="og:title" content="Procedural Anatomical Face">
    <meta property="og:description" content="Anatomical Face — SVG Face Rendering Engine">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://abaas.bridge-ai-os.com/anatomical_face.html">
    <meta name="twitter:card" content="summary">
    <link rel="canonical" href="https://abaas.bridge-ai-os.com/anatomical_face.html">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        html, body { width:100%; height:100%; margin:0; overflow:hidden; }
        canvas { width:100%; height:100%; }
    </style>
<link rel="stylesheet" href="/bridge-tokens.css"></head>
<body>
<canvas id="renderCanvas"></canvas>
<script>

const canvas = document.getElementById("renderCanvas");
const engine = new BABYLON.Engine(canvas, true);

const createScene = function () {
    const scene = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color4(0.05,0.05,0.07,1);

    const camera = new BABYLON.ArcRotateCamera("cam",
        Math.PI/2, Math.PI/2.5, 5,
        new BABYLON.Vector3(0,0,0), scene);
    camera.attachControl(canvas, true);

    const light = new BABYLON.HemisphericLight("light",
        new BABYLON.Vector3(0,1,0), scene);
    light.intensity = 0.9;

    // ===============================
    // SKULL BASE
    // ===============================

    const skull = BABYLON.MeshBuilder.CreateSphere("skull", {
        diameterX: 1.6,
        diameterY: 2.0,
        diameterZ: 1.6,
        segments: 64
    }, scene);

    const skullMat = new BABYLON.StandardMaterial("skullMat", scene);
    skullMat.diffuseColor = new BABYLON.Color3(0.85,0.85,0.85);
    skull.material = skullMat;

    // ===============================
    // SKIN LAYER
    // ===============================

    const skin = skull.clone("skin");
    skin.scaling = new BABYLON.Vector3(1.05,1.05,1.05);

    const skinMat = new BABYLON.PBRMaterial("skinMat", scene);
    skinMat.albedoColor = new BABYLON.Color3(1.0, 0.8, 0.7);
    skinMat.metallic = 0;
    skinMat.roughness = 0.6;
    skin.material = skinMat;

    // ===============================
    // EYES
    // ===============================

    function createEye(xOffset) {
        const eye = BABYLON.MeshBuilder.CreateSphere("eye", {
            diameter: 0.4,
            segments: 32
        }, scene);

        eye.position = new BABYLON.Vector3(xOffset, 0.3, 0.7);

        const eyeMat = new BABYLON.StandardMaterial("eyeMat", scene);
        eyeMat.diffuseColor = new BABYLON.Color3(0.1, 0.4, 0.8); // blue eyes
        eye.material = eyeMat;

        return eye;
    }

    const leftEye = createEye(-0.35);
    const rightEye = createEye(0.35);

    // ===============================
    // NOSE (procedural)
    // ===============================

    const nose = BABYLON.MeshBuilder.CreateCylinder("nose", {
        height: 0.6,
        diameterTop: 0.05,
        diameterBottom: 0.3,
        tessellation: 32
    }, scene);

    nose.rotation.x = Math.PI / 2;
    nose.position = new BABYLON.Vector3(0, 0, 0.9);

    const noseMat = skinMat.clone("noseMat");
    nose.material = noseMat;

    // ===============================
    // CHEEKS (muscle simulation)
    // ===============================

    const leftCheek = BABYLON.MeshBuilder.CreateSphere("cheekL", {
        diameter: 0.6
    }, scene);
    leftCheek.scaling.y = 0.6;
    leftCheek.position = new BABYLON.Vector3(-0.6, -0.2, 0.6);
    leftCheek.material = noseMat;

    const rightCheek = leftCheek.clone("cheekR");
    rightCheek.position.x = 0.6;

    // ===============================
    // ANIMATION SYSTEM
    // ===============================

    scene.registerBeforeRender(function() {
        const t = performance.now() * 0.002;

        // Eye tracking movement
        leftEye.rotation.y = Math.sin(t) * 0.5;
        rightEye.rotation.y = Math.sin(t) * 0.5;

        // Smile morph simulation
        const smile = (Math.sin(t) + 1) / 2;

        leftCheek.scaling.y = 0.6 + smile * 0.2;
        rightCheek.scaling.y = 0.6 + smile * 0.2;

        nose.scaling.x = 1 + smile * 0.1;

        // Subtle breathing skull expansion
        skin.scaling.y = 1.05 + Math.sin(t*0.5)*0.01;
    });

    return scene;
};

const scene = createScene();
engine.runRenderLoop(() => scene.render());
window.addEventListener("resize", () => engine.resize());

</script>
<script src="/bridge-nav.js"></script></body>
</html>
