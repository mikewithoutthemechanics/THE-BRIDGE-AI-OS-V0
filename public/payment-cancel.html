<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Cancelled | Bridge AI-OS</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#060810;color:#fff;font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;text-align:center}
    .icon{font-size:64px;margin-bottom:24px}
    h1{font-size:2rem;font-weight:800;color:#f87171;margin-bottom:12px}
    p{color:#94a3b8;font-size:0.95rem;margin-bottom:32px;max-width:400px}
    .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
    .btn{padding:12px 24px;border-radius:10px;font-size:0.9rem;font-weight:700;text-decoration:none;transition:opacity 0.2s}
    .btn-primary{background:#63ffda;color:#060810}
    .btn-secondary{background:#111827;color:#63ffda;border:1px solid #1a2a3a}
    .btn:hover{opacity:0.85}
  </style>
</head>
<body>
  <div>
    <div class="icon">↩</div>
    <h1>Payment Cancelled</h1>
    <p>No charge was made. You can try again whenever you're ready — your plan selection has been saved.</p>
    <div class="actions">
      <a href="/payment" class="btn btn-primary">Try Again</a>
      <a href="/ui" class="btn btn-secondary">Back to Dashboard</a>
    </div>
  </div>
<script src="/bridge-nav.js" defer></script>
</body>
</html>
