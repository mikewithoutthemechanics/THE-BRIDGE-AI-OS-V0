<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workforce — Bridge AI OS</title>
    <meta name="description" content="Workforce — Team & Resource Management">
    <meta property="og:title" content="Workforce — Bridge AI OS">
    <meta property="og:description" content="Workforce — Team & Resource Management">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://abaas.bridge-ai-os.com/workforce.html">
    <meta name="twitter:card" content="summary">
    <link rel="canonical" href="https://abaas.bridge-ai-os.com/workforce.html">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/bridge-tokens.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            min-height: 100vh;
            background: var(--bg-0);
            font-family: var(--font-ui);
            color: var(--text-primary);
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 80%, rgba(99, 255, 218, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(167, 139, 250, 0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        .shell { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 32px 20px 60px; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-8); }
        .header h1 { font-size: var(--text-3xl); font-weight: var(--weight-bold); letter-spacing: var(--tracking-tight); }
        .header h1 span { color: var(--cyan); }

        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--gap); margin-bottom: var(--space-8); }
        .stat-card {
            background: var(--card-bg);
            border: var(--border-thin) solid var(--border);
            border-radius: var(--radius-md);
            padding: var(--space-5);
            transition: border-color var(--duration-normal) var(--ease-default);
        }
        .stat-card:hover { border-color: var(--cyan); }
        .stat-label { font-size: var(--text-xs); color: var(--text-muted); text-transform: uppercase; letter-spacing: var(--tracking-widest); font-family: var(--font-mono); margin-bottom: var(--space-2); }
        .stat-value { font-size: var(--text-2xl); font-weight: var(--weight-bold); color: var(--cyan); }

        .section-title { font-size: var(--text-lg); font-weight: var(--weight-semibold); margin-bottom: var(--space-4); }

        .two-col { display: grid; grid-template-columns: 1fr 340px; gap: var(--gap-lg); }

        .table-wrap {
            background: var(--card-bg);
            border: var(--border-thin) solid var(--border);
            border-radius: var(--radius-md);
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: var(--text-xs); color: var(--text-muted); text-transform: uppercase; letter-spacing: var(--tracking-widest); font-family: var(--font-mono); padding: var(--space-3) var(--space-4); border-bottom: var(--border-thin) solid var(--border); background: var(--bg-2); }
        td { padding: var(--space-3) var(--space-4); font-size: var(--text-sm); border-bottom: var(--border-thin) solid var(--border); }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(99, 255, 218, 0.03); }

        .badge { display: inline-block; padding: 2px 10px; border-radius: var(--radius-full); font-size: var(--text-xs); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: var(--tracking-wide); }
        .badge-active { color: var(--alive); border: 1px solid rgba(0,255,136,0.3); background: rgba(0,255,136,0.08); }
        .badge-idle { color: var(--degraded); border: 1px solid rgba(255,170,0,0.3); background: rgba(255,170,0,0.08); }
        .badge-offline { color: var(--text-muted); border: 1px solid var(--unknown); background: rgba(102,102,102,0.08); }

        .perf-bar { display: flex; align-items: center; gap: var(--space-2); }
        .perf-track { flex: 1; height: 6px; background: var(--bg-2); border-radius: var(--radius-full); overflow: hidden; }
        .perf-fill { height: 100%; border-radius: var(--radius-full); transition: width var(--duration-slow) var(--ease-out); }
        .perf-fill.high { background: var(--alive); }
        .perf-fill.mid { background: var(--degraded); }
        .perf-fill.low { background: var(--offline); }
        .perf-num { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-secondary); min-width: 32px; text-align: right; }

        /* Department breakdown sidebar */
        .dept-card {
            background: var(--card-bg);
            border: var(--border-thin) solid var(--border);
            border-radius: var(--radius-md);
            padding: var(--space-5);
        }
        .dept-row { display: flex; justify-content: space-between; align-items: center; padding: var(--space-2) 0; border-bottom: var(--border-thin) solid var(--border); font-size: var(--text-sm); }
        .dept-row:last-child { border-bottom: none; }
        .dept-name { color: var(--text-secondary); }
        .dept-count { font-family: var(--font-mono); color: var(--cyan); font-weight: var(--weight-semibold); }

        .empty { text-align: center; padding: var(--space-10); color: var(--text-muted); font-family: var(--font-mono); font-size: var(--text-sm); }
        .error-msg { color: var(--offline); font-size: var(--text-sm); font-family: var(--font-mono); padding: var(--space-4); text-align: center; }

        @media (max-width: 800px) {
            .two-col { grid-template-columns: 1fr; }
            .stats-row { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
<div class="shell">
    <div class="header">
        <h1><span>Workforce</span> — Bridge AI OS</h1>
        <button class="btn-primary" id="addAgentBtn" style="padding:8px 16px;background:var(--cyan);color:var(--bg-0);border:none;border-radius:var(--radius-sm);font-weight:600;cursor:pointer;">Add Agent</button>
    </div>

    <div class="stats-row">
        <div class="stat-card"><div class="stat-label">Total Workforce</div><div class="stat-value" id="s-total">--</div></div>
        <div class="stat-card"><div class="stat-label">Active</div><div class="stat-value" id="s-active">--</div></div>
        <div class="stat-card"><div class="stat-label">Utilization</div><div class="stat-value" id="s-util">--</div></div>
    </div>

    <div class="two-col">
        <div>
            <div class="section-title">Agents &amp; Employees</div>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>Name</th><th>Role</th><th>Dept</th><th>Status</th><th>Performance</th></tr></thead>
                    <tbody id="wf-body"><tr><td colspan="5" class="empty">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>
        <div>
            <div class="section-title">Department Breakdown</div>
            <div class="dept-card" id="dept-list">
                <div class="empty">Loading...</div>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    var body = document.getElementById('wf-body');
    var deptList = document.getElementById('dept-list');

    function statusBadge(s) {
        var st = (s || 'offline').toLowerCase();
        if (st === 'active' || st === 'online') return 'badge badge-active';
        if (st === 'idle' || st === 'busy') return 'badge badge-idle';
        return 'badge badge-offline';
    }

    function perfClass(v) {
        if (v >= 75) return 'high';
        if (v >= 40) return 'mid';
        return 'low';
    }

    function renderRow(a) {
        var tr = document.createElement('tr');
        var perf = Number(a.performance || a.score || 0);

        var tdName = document.createElement('td');
        tdName.textContent = a.name || '--';

        var tdRole = document.createElement('td');
        tdRole.textContent = a.role || '--';
        tdRole.style.color = 'var(--text-secondary)';

        var tdDept = document.createElement('td');
        tdDept.textContent = a.department || a.dept || '--';

        var tdStatus = document.createElement('td');
        var badge = document.createElement('span');
        badge.className = statusBadge(a.status);
        badge.textContent = a.status || 'offline';
        tdStatus.appendChild(badge);

        var tdPerf = document.createElement('td');
        var perfBar = document.createElement('div');
        perfBar.className = 'perf-bar';
        var track = document.createElement('div');
        track.className = 'perf-track';
        var fill = document.createElement('div');
        fill.className = 'perf-fill ' + perfClass(perf);
        fill.style.width = perf + '%';
        track.appendChild(fill);
        var num = document.createElement('span');
        num.className = 'perf-num';
        num.textContent = perf + '%';
        perfBar.appendChild(track);
        perfBar.appendChild(num);
        tdPerf.appendChild(perfBar);

        tr.appendChild(tdName);
        tr.appendChild(tdRole);
        tr.appendChild(tdDept);
        tr.appendChild(tdStatus);
        tr.appendChild(tdPerf);
        return tr;
    }

    function renderDepts(list) {
        var depts = {};
        list.forEach(function(a) {
            var d = a.department || a.dept || 'Unassigned';
            depts[d] = (depts[d] || 0) + 1;
        });
        deptList.replaceChildren();
        var keys = Object.keys(depts).sort(function(a, b) { return depts[b] - depts[a]; });
        if (!keys.length) {
            var empty = document.createElement('div');
            empty.className = 'empty';
            empty.textContent = 'No data';
            deptList.appendChild(empty);
            return;
        }
        keys.forEach(function(k) {
            var row = document.createElement('div');
            row.className = 'dept-row';
            var name = document.createElement('span');
            name.className = 'dept-name';
            name.textContent = k;
            var count = document.createElement('span');
            count.className = 'dept-count';
            count.textContent = depts[k];
            row.appendChild(name);
            row.appendChild(count);
            deptList.appendChild(row);
        });
    }

    function load() {
        fetch('/api/agents/workforce').then(function(r) { return r.json(); }).then(function(data) {
            var list = Array.isArray(data) ? data : (data.workforce || data.agents || data.data || []);
            updateStats(list);
            renderDepts(list);
            body.replaceChildren();
            if (!list.length) {
                var tr = document.createElement('tr');
                var td = document.createElement('td');
                td.colSpan = 5; td.className = 'empty'; td.textContent = 'No workforce data';
                tr.appendChild(td); body.appendChild(tr);
                return;
            }
            list.forEach(function(a) { body.appendChild(renderRow(a)); });
        }).catch(function() {
            body.replaceChildren();
            var tr = document.createElement('tr');
            var td = document.createElement('td');
            td.colSpan = 5; td.className = 'error-msg'; td.textContent = 'Failed to load workforce data';
            tr.appendChild(td); body.appendChild(tr);
            deptList.replaceChildren();
            var err = document.createElement('div');
            err.className = 'error-msg';
            err.textContent = 'Failed to load';
            deptList.appendChild(err);
        });
    }

    function updateStats(list) {
        document.getElementById('s-total').textContent = list.length;
        var active = list.filter(function(a) {
            var s = (a.status || '').toLowerCase();
            return s === 'active' || s === 'online';
        }).length;
        document.getElementById('s-active').textContent = active;
        if (list.length) {
            var totalPerf = list.reduce(function(s, a) { return s + Number(a.performance || a.score || 0); }, 0);
            document.getElementById('s-util').textContent = Math.round(totalPerf / list.length) + '%';
        } else {
            document.getElementById('s-util').textContent = '0%';
        }
    }

    document.getElementById('addAgentBtn').addEventListener('click', function() {
        var name = prompt('Agent/Employee name:');
        if (!name) return;
        var role = prompt('Role:') || 'Agent';
        var dept = prompt('Department:') || 'Operations';
        fetch('/api/agents/workforce', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name, role: role, department: dept, status: 'active', performance: 50 })
        }).then(function(r) { return r.json(); }).then(function() {
            load();
        }).catch(function() { alert('Failed to add agent'); });
    });

    load();
})();
</script>
<script src="/bridge-nav.js?v=2"></script>
</body>
</html>
