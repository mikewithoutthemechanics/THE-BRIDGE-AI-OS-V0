<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#050a0f"/>
  <!-- Circuit board background lines -->
  <g stroke="#00c8ff" stroke-opacity="0.15" stroke-width="1.5" fill="none">
    <line x1="64" y1="128" x2="448" y2="128"/>
    <line x1="64" y1="256" x2="448" y2="256"/>
    <line x1="64" y1="384" x2="448" y2="384"/>
    <line x1="128" y1="64" x2="128" y2="448"/>
    <line x1="256" y1="64" x2="256" y2="448"/>
    <line x1="384" y1="64" x2="384" y2="448"/>
  </g>
  <!-- Circuit nodes -->
  <g fill="#00c8ff" fill-opacity="0.25">
    <circle cx="128" cy="128" r="6"/>
    <circle cx="384" cy="128" r="6"/>
    <circle cx="128" cy="384" r="6"/>
    <circle cx="384" cy="384" r="6"/>
    <circle cx="256" cy="128" r="4"/>
    <circle cx="256" cy="384" r="4"/>
    <circle cx="128" cy="256" r="4"/>
    <circle cx="384" cy="256" r="4"/>
  </g>
  <!-- Stylized "B" letterform -->
  <path d="
    M 160 112
    L 160 400
    L 280 400
    Q 370 400 370 340
    Q 370 290 310 272
    Q 360 258 360 210
    Q 360 112 280 112
    Z
    M 210 160
    L 270 160
    Q 310 160 310 210
    Q 310 248 270 248
    L 210 248
    Z
    M 210 290
    L 280 290
    Q 320 290 320 340
    Q 320 358 280 358
    L 210 358
    Z
  " fill="url(#bGrad)" />
  <!-- Circuit traces from the B -->
  <g stroke="#00c8ff" stroke-width="2" stroke-opacity="0.5" fill="none">
    <path d="M 370 340 L 420 340 L 420 280"/>
    <path d="M 360 210 L 420 210 L 420 150"/>
    <path d="M 160 160 L 110 160 L 110 100"/>
    <path d="M 160 358 L 100 358 L 100 420"/>
  </g>
  <!-- Trace endpoint dots -->
  <g fill="#00c8ff" fill-opacity="0.7">
    <circle cx="420" cy="280" r="5"/>
    <circle cx="420" cy="150" r="5"/>
    <circle cx="110" cy="100" r="5"/>
    <circle cx="100" cy="420" r="5"/>
  </g>
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="bGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e0ff"/>
      <stop offset="100%" stop-color="#00c8ff"/>
    </linearGradient>
  </defs>
</svg>
