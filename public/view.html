<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bridge AI OS — Viewer</title>
<style>
:root{--bg:#050a0f;--bg2:#0a1520;--border:#1a2d40;--cyan:#00c8ff;--green:#00e57b;--red:#ff3c5a;--gold:#ffd166;--purple:#a78bfa;--dim:#4d6678;--text:#e0e8f0}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.6;padding-bottom:64px}
.header{display:flex;align-items:center;padding:12px 24px;background:var(--bg2);border-bottom:1px solid var(--border);gap:16px;position:sticky;top:0;z-index:10}
.header .brand{color:var(--cyan);font-weight:700;font-size:14px;letter-spacing:1px;text-decoration:none}
.header nav{display:flex;gap:4px}
.header nav a{color:var(--dim);text-decoration:none;font-size:12px;padding:4px 10px;border-radius:4px}
.header nav a:hover{color:var(--cyan);background:rgba(0,200,255,.05)}
.header .source{margin-left:auto;font-size:11px;color:var(--dim);font-family:'Courier New',monospace}
.page{max-width:900px;margin:0 auto;padding:32px 24px}
h1{font-size:24px;font-weight:700;color:var(--text);margin-bottom:8px}
h2{font-size:18px;font-weight:600;color:var(--cyan);margin-top:28px;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
h3{font-size:15px;font-weight:600;color:var(--text);margin-top:20px;margin-bottom:8px}
p{margin-bottom:12px;color:var(--text)}
a{color:var(--cyan);text-decoration:none}
a:hover{text-decoration:underline}
code{background:var(--bg2);border:1px solid var(--border);padding:1px 6px;border-radius:4px;font-size:13px;font-family:'Courier New',monospace;color:var(--green)}
pre{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;overflow-x:auto;margin:12px 0;font-size:13px;font-family:'Courier New',monospace;color:var(--green);line-height:1.5}
table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
th{text-align:left;padding:8px 12px;border-bottom:2px solid var(--border);color:var(--dim);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
td{padding:8px 12px;border-bottom:1px solid rgba(26,45,64,.4)}
tr:hover td{background:rgba(0,200,255,.02)}
ul,ol{margin:8px 0 12px 24px}
li{margin-bottom:4px}
blockquote{border-left:3px solid var(--cyan);padding:8px 16px;margin:12px 0;background:rgba(0,200,255,.03);border-radius:0 6px 6px 0}
blockquote p{color:var(--dim);margin:0}
strong{color:var(--text);font-weight:700}
em{color:var(--gold)}
hr{border:none;border-top:1px solid var(--border);margin:24px 0}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
.badge.green{background:rgba(0,229,123,.1);color:var(--green)}
.badge.red{background:rgba(255,60,90,.1);color:var(--red)}
.badge.cyan{background:rgba(0,200,255,.1);color:var(--cyan)}
.badge.gold{background:rgba(255,209,102,.1);color:var(--gold)}
/* JSON viewer */
.json-key{color:var(--cyan)}
.json-string{color:var(--green)}
.json-number{color:var(--gold)}
.json-bool{color:var(--purple)}
.json-null{color:var(--dim)}
.loading{text-align:center;padding:40px;color:var(--dim)}
.error{padding:20px;background:rgba(255,60,90,.05);border:1px solid rgba(255,60,90,.2);border-radius:8px;color:var(--red)}
</style>
</head>
<body>
<div class="header">
  <a class="brand" href="/">BRIDGE AI OS</a>
  <nav>
    <a href="/">Home</a>
    <a href="/portal.html">Portal</a>
    <a href="/admin-revenue.html">Revenue</a>
    <a href="/aoe-dashboard.html">Hub</a>
    <a href="/console.html">Terminal</a>
  </nav>
  <span class="source" id="source-url">--</span>
</div>
<div class="page" id="content">
  <div class="loading">Loading...</div>
</div>

<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var src = params.get('src') || params.get('url') || '';
  var title = params.get('title') || '';

  document.getElementById('source-url').textContent = src || 'No source specified';

  if (!src) {
    document.getElementById('content').textContent = 'Usage: /view.html?src=/api/endpoint&title=Page Title';
    return;
  }

  // Detect content type from URL
  var isMd = src.endsWith('.md');
  var isJson = src.startsWith('/api/') || src.endsWith('.json');

  fetch(src).then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.text();
  }).then(function(text) {
    var container = document.getElementById('content');
    container.textContent = '';

    if (title) {
      var h1 = document.createElement('h1');
      h1.textContent = title;
      container.appendChild(h1);
    }

    if (isMd) {
      renderMarkdown(container, text);
    } else if (isJson || text.trim().startsWith('{') || text.trim().startsWith('[')) {
      try {
        var data = JSON.parse(text);
        renderJson(container, data, src);
      } catch (e) {
        var pre = document.createElement('pre');
        pre.textContent = text;
        container.appendChild(pre);
      }
    } else {
      var pre = document.createElement('pre');
      pre.textContent = text;
      container.appendChild(pre);
    }

    if (title) document.title = title + ' — Bridge AI OS';
  }).catch(function(e) {
    var container = document.getElementById('content');
    container.textContent = '';
    var div = document.createElement('div');
    div.className = 'error';
    div.textContent = 'Failed to load ' + src + ': ' + e.message;
    container.appendChild(div);
  });

  // ── Markdown renderer (basic but functional) ──
  function renderMarkdown(container, md) {
    var lines = md.split('\n');
    var html = '';
    var inCode = false;
    var inTable = false;
    var inList = false;

    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];

      // Code blocks
      if (line.trim().startsWith('```')) {
        if (inCode) { html += '</pre>'; inCode = false; }
        else { html += '<pre>'; inCode = true; }
        continue;
      }
      if (inCode) { html += escapeHtml(line) + '\n'; continue; }

      // Headers
      if (line.startsWith('# ')) { html += '<h1>' + escapeHtml(line.slice(2)) + '</h1>'; continue; }
      if (line.startsWith('## ')) { html += '<h2>' + escapeHtml(line.slice(3)) + '</h2>'; continue; }
      if (line.startsWith('### ')) { html += '<h3>' + escapeHtml(line.slice(4)) + '</h3>'; continue; }

      // Horizontal rule
      if (line.trim() === '---' || line.trim() === '***') { html += '<hr>'; continue; }

      // Blockquote
      if (line.startsWith('> ')) { html += '<blockquote><p>' + inlineFormat(line.slice(2)) + '</p></blockquote>'; continue; }

      // Table
      if (line.includes('|') && line.trim().startsWith('|')) {
        var cells = line.split('|').filter(function(c) { return c.trim(); });
        if (cells.every(function(c) { return /^[\s-:]+$/.test(c); })) continue; // separator row
        if (!inTable) { html += '<table>'; inTable = true; }
        var tag = i > 0 && lines[i-1] && lines[i-1].includes('|') && !inTable ? 'th' : 'td';
        // Check if this is the first data row (header)
        if (i + 1 < lines.length && lines[i+1] && /^\|[\s-:|]+\|$/.test(lines[i+1].trim())) tag = 'th';
        html += '<tr>' + cells.map(function(c) { return '<' + tag + '>' + inlineFormat(c.trim()) + '</' + tag + '>'; }).join('') + '</tr>';
        continue;
      }
      if (inTable && !line.includes('|')) { html += '</table>'; inTable = false; }

      // List items
      if (/^[\s]*[-*]\s/.test(line)) {
        if (!inList) { html += '<ul>'; inList = true; }
        html += '<li>' + inlineFormat(line.replace(/^[\s]*[-*]\s/, '')) + '</li>';
        continue;
      }
      if (/^[\s]*\d+\.\s/.test(line)) {
        if (!inList) { html += '<ol>'; inList = true; }
        html += '<li>' + inlineFormat(line.replace(/^[\s]*\d+\.\s/, '')) + '</li>';
        continue;
      }
      if (inList && line.trim() === '') { html += inList === 'ol' ? '</ol>' : '</ul>'; inList = false; continue; }

      // Paragraph
      if (line.trim()) html += '<p>' + inlineFormat(line) + '</p>';
    }
    if (inCode) html += '</pre>';
    if (inTable) html += '</table>';
    if (inList) html += '</ul>';

    container.insertAdjacentHTML('beforeend', html);
  }

  function inlineFormat(text) {
    return escapeHtml(text)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`(.+?)`/g, '<code>$1</code>')
      .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>');
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── JSON renderer ──
  function renderJson(container, data, endpoint) {
    // Add endpoint badge
    var badge = document.createElement('div');
    badge.style.cssText = 'margin-bottom:16px;display:flex;align-items:center;gap:8px';
    var method = document.createElement('span');
    method.className = 'badge green';
    method.textContent = 'GET';
    badge.appendChild(method);
    var url = document.createElement('code');
    url.textContent = endpoint;
    url.style.fontSize = '14px';
    badge.appendChild(url);
    if (data.ok !== undefined) {
      var status = document.createElement('span');
      status.className = 'badge ' + (data.ok ? 'green' : 'red');
      status.textContent = data.ok ? 'OK' : 'Error';
      badge.appendChild(status);
    }
    container.appendChild(badge);

    // Render as formatted JSON with syntax highlighting
    var pre = document.createElement('pre');
    pre.style.whiteSpace = 'pre-wrap';
    var jsonStr = JSON.stringify(data, null, 2);
    // Syntax highlight
    jsonStr = escapeHtml(jsonStr)
      .replace(/"([^"]+)":/g, '<span class="json-key">"$1"</span>:')
      .replace(/: "([^"]*)"/g, ': <span class="json-string">"$1"</span>')
      .replace(/: (\d+\.?\d*)/g, ': <span class="json-number">$1</span>')
      .replace(/: (true|false)/g, ': <span class="json-bool">$1</span>')
      .replace(/: (null)/g, ': <span class="json-null">$1</span>');
    pre.insertAdjacentHTML('beforeend', jsonStr);
    container.appendChild(pre);
  }
})();
</script>
<script src="/global-nav.js" defer></script>
</body>
</html>
