# ─────────────────────────────────────────────────────────────────────────────
# Bridge AI OS — Nginx vhost config
# Covers: go.ai-os.co.za + all vertical-market subdomains
# Apply: scp nginx-bridge.conf root@VPS:/etc/nginx/sites-available/bridgeai
#        ssh root@VPS "ln -sf /etc/nginx/sites-available/bridgeai /etc/nginx/sites-enabled/bridgeai && nginx -t && systemctl reload nginx"
# SSL:   certbot --nginx -d go.ai-os.co.za -d ehsa.ai-os.co.za -d hospitalinabox.ai-os.co.za -d aid.ai-os.co.za -d rootedearth.ai-os.co.za -d aurora.ai-os.co.za -d ubi.ai-os.co.za
# ─────────────────────────────────────────────────────────────────────────────

# ── Shared proxy block (used by all vhosts via include) ──────────────────────
# NOTE: Nginx doesn't support inline includes, so we define the proxy settings
# per-block. All vhosts proxy to 127.0.0.1:8080 (gateway.js).

# ── go.ai-os.co.za ───────────────────────────────────────────────────────────
server {
    listen 80;
    server_name go.ai-os.co.za 102.208.228.44;
    return 301 https://go.ai-os.co.za$request_uri;
}

server {
    listen 443 ssl;
    server_name go.ai-os.co.za 102.208.228.44;

    ssl_certificate /etc/letsencrypt/live/go.ai-os.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/go.ai-os.co.za/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /terminal {
        proxy_pass http://127.0.0.1:5002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location /events/stream {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400;
    }
}

