name             = "bridge-vps-proxy"
main             = "index.js"
compatibility_date = "2025-01-01"
workers_dev      = false

# ── bridge-ai-os.com zone (managed by this account) ─────────────────────────
[[routes]]
pattern   = "live.bridge-ai-os.com/*"
zone_name = "bridge-ai-os.com"

# ── supaco.ai zone routes ────────────────────────────────────────────────────
# These require the supaco.ai zone to be in the same CF account.
# If supaco.ai is on a separate account, run:
#   CLOUDFLARE_API_TOKEN=<supaco-ai-token> npx wrangler deploy --config wrangler.supaco.toml

[[routes]]
pattern   = "supaco.ai/*"
zone_name = "supaco.ai"

[[routes]]
pattern   = "www.supaco.ai/*"
zone_name = "supaco.ai"

[[routes]]
pattern   = "app.supaco.ai/*"
zone_name = "supaco.ai"

[[routes]]
pattern   = "admin.supaco.ai/*"
zone_name = "supaco.ai"
